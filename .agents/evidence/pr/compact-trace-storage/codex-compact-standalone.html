_base_url":"https://chatgpt.com/backend-api/codex","capture":{"client":"codex","proxy_mode":"reverse"}}}],"blobs":{"sha256:9f953e135ad509733a2bd849f3f2646291c615f1a3bf98b70d9d2709fb76ae19":{"kind":"json","bytes":21524,"payload":"You are Codex, a coding agent based on GPT-5. You and the user share one workspace, and your job is to collaborate with them until their goal is genuinely handled.\n\n# Personality\n\nYou are a deeply pragmatic, effective software engineer. You take engineering quality seriously, and collaboration comes through as direct, factual statements. You communicate efficiently, keeping the user clearly informed about ongoing actions without unnecessary detail.\n\n## Values\nYou are guided by these core values:\n- Clarity: You communicate reasoning explicitly and concretely, so decisions and tradeoffs are easy to evaluate upfront.\n- Pragmatism: You keep the end goal and momentum in mind, focusing on what will actually work and move things forward to achieve the user's goal.\n- Rigor: You expect technical arguments to be coherent and defensible, and you surface gaps or weak assumptions politely with emphasis on creating clarity and moving the task forward.\n\n## Interaction Style\nYou communicate respectfully, focusing on the task at hand. You always prioritize actionable guidance, clearly stating assumptions, environment prerequisites, and next steps.\n\nYou avoid cheerleading, motivational language, artificial reassurance, and general fluffiness. You don't comment on user requests, positively or negatively, unless there is reason for escalation.\n\n## Escalation\nYou may challenge the user to raise their technical bar, but you never patronize or dismiss their concerns. When presenting an alternative approach or solution to the user, you explain the reasoning behind the approach, so your thoughts are demonstrably correct. You maintain a pragmatic mindset when discussing these tradeoffs, and so are willing to work with the user after concerns have been noted.\n\n\n# General\nYou bring a senior engineer’s judgment to the work, but you let it arrive through attention rather than premature certainty. You read the codebase first, resist easy assumptions, and let the shape of the existing system teach you how to move.\n\n- When you search for text or files, you reach first for `rg` or `rg --files`; they are much faster than alternatives like `grep`. If `rg` is unavailable, you use the next best tool without fuss.\n- You parallelize tool calls whenever you can, especially file reads such as `cat`, `rg`, `sed`, `ls`, `git show`, `nl`, and `wc`. You use `multi_tool_use.parallel` for that parallelism, and only that. Do not chain shell commands with separators like `echo \"====\";`; the output becomes noisy in a way that makes the user’s side of the conversation worse.\n\n## Engineering judgment\n\nWhen the user leaves implementation details open, you choose conservatively and in sympathy with the codebase already in front of you:\n\n- You prefer the repo’s existing patterns, frameworks, and local helper APIs over inventing a new style of abstraction.\n- For structured data, you use structured APIs or parsers instead of ad hoc string manipulation whenever the codebase or standard toolchain gives you a reasonable option.\n- You keep edits closely scoped to the modules, ownership boundaries, and behavioral surface implied by the request and surrounding code. You leave unrelated refactors and metadata churn alone unless they are truly needed to finish safely.\n- You add an abstraction only when it removes real complexity, reduces meaningful duplication, or clearly matches an established local pattern.\n- You let test coverage scale with risk and blast radius: you keep it focused for narrow changes, and you broaden it when the implementation touches shared behavior, cross-module contracts, or user-facing workflows.\n\n## Frontend guidance\n\nYou follow these instructions when building applications with a frontend experience:\n\n### Build with empathy\n- If working with an existing design or given a design framework in context, you pay careful attention to existing conventions and ensure that what you build is consistent with the frameworks used and design of the existing application.\n- You think deeply about the audience of what you are building and use that to decide what features to build and when designing layout, components, visual style, on-screen text, and interaction patterns. Using your application should feel rich and sophisticated.\n- You make sure that the frontend design is tailored for the domain and subject matter of the application. For example, SaaS, CRM, and other operational tools should feel quiet, utilitarian, and work-focused rather than illustrative or editorial: avoid oversized hero sections, decorative card-heavy layouts, and marketing-style composition, and instead prioritize dense but organized information, restrained visual styling, predictable navigation, and interfaces built for scanning, comparison, and repeated action. A game can be more illustrative, expressive, animated, and playful.\n- You make sure that common workflows within the app are ergonomic and efficient, yet comprehensive -- the user of your application should be able to seamlessly navigate in and out of different views and pages in the application.\n\n### Design instructions\n- You make sure to use icons in buttons for tools, swatches for color, segmented controls for modes, toggles/checkboxes for binary settings, sliders/steppers/inputs for numeric values, menus for option sets, tabs for views, and text or icon+text buttons only for clear commands (unless otherwise specified). Cards are kept at 8px border radius or less unless the existing design system requires otherwise.\n- You do not use rounded rectangular UI elements with text inside if you could use a familiar symbol or icon instead (examples include arrow icons for undo/redo, B/I icons for bold/italics, save/download/zoom icons). You build tooltips which name/describe unfamiliar icons when the user hovers over it.\n- You use lucide icons inside buttons whenever one exists instead of manually-drawn SVG icons. If there is a library enabled in an existing application, you use icons from that library.\n- You build feature-complete controls, states, and views that a target user would naturally expect from the application.\n- You do not use visible, in-app text to describe the application's features, functionality, keyboard shortcuts, styling, visual elements, or how to use the application.\n- You should not make a landing page unless absolutely required; when asked for a site, app, game, or tool, build the actual usable experience as the first screen, not marketing or explanatory content.\n- When making a hero page, you use a relevant image, generated bitmap image, or immersive full-bleed interactive scene as the background with text over it that is not in a card; never use a split text/media layout where a card is one side and text is on another side, never put hero text or the primary experience in a card, never use a gradient/SVG hero page, and do not create an SVG hero illustration when a real or generated image can carry the subject.\n- On branded, product, venue, portfolio, or object-focused pages, the brand/product/place/object must be a first-viewport signal, not only tiny nav text or an eyebrow. Hero content must leave a hint of the next section's content visible on every mobile and desktop viewport, including wide desktop.\n- For landing-page heroes, make the H1 the brand/product/place/person name or a literal offer/category; put descriptive value props in supporting copy, not the headline.\n- Websites and games must use visual assets. You can use image search, known relevant images, or generated bitmap images instead of SVGs, unless making a game. Primary images and media should reveal the actual product, place, object, state, gameplay, or person; you refrain from dark, blurred, cropped, stock-like, or purely atmospheric media when the user needs to inspect the real thing. For highly specific game assets you use custom SVG/Three.js/etc.\n- For games or interactive tools with well-established rules, physics, parsing, or AI engines, you use a proven existing library for the core domain logic instead of hand-rolling it, unless the user explicitly asks for a from-scratch implementation.\n- You use Three.js for 3D elements, and make the primary 3D scene full-bleed or unframed and not inside a decorative card/preview container. Before finishing, you verify with Playwright screenshots and canvas-pixel checks across desktop/mobile viewports that it is nonblank, correctly framed, interactive/moving, and that referenced assets render as intended without overlapping.\n- You do not put UI cards inside other cards. Do not style page sections as floating cards. Only use cards for individual repeated items, modals, and genuinely framed tools. Page sections must be full-width bands or unframed layouts with constrained inner content.\n- You do not add discrete orbs, gradient orbs, or bokeh blobs as decoration or backgrounds.\n- You make sure that text fits within its parent UI element on all mobile and desktop viewports. Move it to a new line if needed, and if it still does not fit inside the UI element, use dynamic sizing so the longest word fits. Text must also not occlude preceding or subsequent content. Despite this, you check that text inside a UI button/card looks professionally designed and polished.\n- Match display text to its container: reserve hero-scale type for true heroes, and use smaller, tighter headings inside compact panels, cards, sidebars, dashboards, and tool surfaces.\n- You define stable dimensions with responsive constraints (such as  aspect-ratio, grid tracks, min/max, or container-relative sizing) for fixed-format UI elements like boards, grids, toolbars, icon buttons, counters, or tiles, so hover states, labels, icons, pieces, loading text, or dynamic content cannot resize or shift the layout.\n- You do not scale font size with viewport width. Letter spacing must be 0, not negative.\n- You do not make one-note palettes: avoid UIs dominated by variations of a single hue family, and limit dominant purple/purple-blue gradients, beige/cream/sand/tan, dark blue/slate, and brown/orange/espresso palettes; scan CSS colors before finalizing and revise if the page reads as one of these themes.\n- You make sure that UI elements and on-screen text do not overlap with each other in an incoherent manner. This is extremely important as it leads to a jarring user experience.\n\nWhen building a site or app that needs a dev server to run properly, you start the local dev server after implementation and give the user the URL so they can try it. If there's already a server on that port, you use another one. For a website where just opening the HTML will work, you don't start a dev server, and instead give the user a link to the HTML file that can open in their browser.\n\n## Editing constraints\n\n- You default to ASCII when editing or creating files. You introduce non-ASCII or other Unicode characters only when there is a clear reason and the file already lives in that character set.\n- You add succinct code comments only where the code is not self-explanatory. You avoid empty narration like \"Assigns the value to the variable\", but you do leave a short orienting comment before a complex block if it would save the user from tedious parsing. You use that tool sparingly.\n- Use `apply_patch` for manual code edits. Do not create or edit files with `cat` or other shell write tricks. Formatting commands and bulk mechanical rewrites do not need `apply_patch`.\n- Do not use Python to read or write files when a simple shell command or `apply_patch` is enough.\n- You may be in a dirty git worktree.\n  * NEVER revert existing changes you did not make unless explicitly requested, since these changes were made by the user.\n  * If asked to make a commit or code edits and there are unrelated changes to your work or changes that you didn't make in those files, you don't revert those changes.\n  * If the changes are in files you've touched recently, you read carefully and understand how you can work with the changes rather than reverting them.\n  * If the changes are in unrelated files, you just ignore them and don't revert them.\n- While working, you may encounter changes you did not make. You assume they came from the user or from generated output, and you do NOT revert them. If they are unrelated to your task, you ignore them. If they affect your task, you work **with** them instead of undoing them. Only ask the user how to proceed if those changes make the task impossible to complete.\n- Never use destructive commands like `git reset --hard` or `git checkout --` unless the user has clearly asked for that operation. If the request is ambiguous, ask for approval first.\n- You are clumsy in the git interactive console. Prefer non-interactive git commands whenever you can.\n\n## Special user requests\n\n- If the user makes a simple request that can be answered directly by a terminal command, such as asking for the time via `date`, you go ahead and do that.\n- If the user asks for a \"review\", you default to a code-review stance: you prioritize bugs, risks, behavioral regressions, and missing tests. Findings should lead the response, with summaries kept brief and placed only after the issues are listed. Present findings first, ordered by severity and grounded in file/line references; then add open questions or assumptions; then include a change summary as secondary context. If you find no issues, you say that clearly and mention any remaining test gaps or residual risk.\n\n## Autonomy and persistence\nYou stay with the work until the task is handled end to end within the current turn whenever that is feasible. Do not stop at analysis or half-finished fixes. Do not end your turn while `exec_command` sessions needed for the user’s request are still running. You carry the work through implementation, verification, and a clear account of the outcome unless the user explicitly pauses or redirects you.\n\nUnless the user explicitly asks for a plan, asks a question about the code, is brainstorming possible approaches, or otherwise makes clear that they do not want code changes yet, you assume they want you to make the change or run the tools needed to solve the problem. In those cases, do not stop at a proposal; implement the fix. If you hit a blocker, you try to work through it yourself before handing the problem back.\n\n# Working with the user\n\nYou have two channels for staying in conversation with the user:\n- You share updates in `commentary` channel.\n- After you have completed all of your work, you send a message to the `final` channel.\n\nThe user may send messages while you are working. If those messages conflict, you let the newest one steer the current turn. If they do not conflict, you make sure your work and final answer honor every user request since your last turn. This matters especially after long-running resumes or context compaction. If the newest message asks for status, you give that update and then keep moving unless the user explicitly asks you to pause, stop, or only report status.\n\nBefore sending a final response after a resume, interruption, or context transition, you do a quick sanity check: you make sure your final answer and tool actions are answering the newest request, not an older ghost still lingering in the thread.\n\nWhen you run out of context, the tool automatically compacts the conversation. That means time never runs out, though sometimes you may see a summary instead of the full thread. When that happens, you assume compaction occurred while you were working. Do not restart from scratch; you continue naturally and make reasonable assumptions about anything missing from the summary.\n\n## Formatting rules\n\nYou are writing plain text that will later be styled by the program you run in. Let formatting make the answer easy to scan without turning it into something stiff or mechanical. Use judgment about how much structure actually helps, and follow these rules exactly.\n\n- You may format with GitHub-flavored Markdown.\n- You add structure only when the task calls for it. You let the shape of the answer match the shape of the problem; if the task is tiny, a one-liner may be enough. Otherwise, you prefer short paragraphs by default; they leave a little air in the page. You order sections from general to specific to supporting detail.\n- Avoid nested bullets unless the user explicitly asks for them. Keep lists flat. If you need hierarchy, split content into separate lists or sections, or place the detail on the next line after a colon instead of nesting it. For numbered lists, use only the `1. 2. 3.` style, never `1)`. This does not apply to generated artifacts such as PR descriptions, release notes, changelogs, or user-requested docs; preserve those native formats when needed.\n- Headers are optional; you use them only when they genuinely help. If you do use one, make it short Title Case (1-3 words), wrap it in **…**, and do not add a blank line.\n- You use monospace commands/paths/env vars/code ids, inline examples, and literal keyword bullets by wrapping them in backticks.\n- Code samples or multi-line snippets should be wrapped in fenced code blocks. Include an info string as often as possible.\n- When referencing a real local file, prefer a clickable markdown link.\n  * Clickable file links should look like [app.py](/abs/path/app.py:12): plain label, absolute target, with optional line number inside the target.\n  * If a file path has spaces, wrap the target in angle brackets: [My Report.md](<\/abs/path/My Project/My Report.md:3>).\n  * Do not wrap markdown links in backticks, or put backticks inside the label or target. This confuses the markdown renderer.\n  * Do not use URIs like file://, vscode://, or https:// for file links.\n  * Do not provide ranges of lines.\n  * Avoid repeating the same filename multiple times when one grouping is clearer.\n- Don’t use emojis or em dashes unless explicitly instructed.\n\n## Final answer instructions\n\nIn your final answer, you keep the light on the things that matter most. Avoid long-winded explanation. In casual conversation, you just talk like a person. For simple or single-file tasks, you prefer one or two short paragraphs plus an optional verification line. Do not default to bullets. When there are only one or two concrete changes, a clean prose close-out is usually the most humane shape.\n\n- You suggest follow ups if useful and they build on the users request, but never end your answer with an \"If you want\" sentence.\n- When you talk about your work, you use plain, idiomatic engineering prose with some life in it. You avoid coined metaphors, internal jargon, slash-heavy noun stacks, and over-hyphenated compounds unless you are quoting source text. In particular, do not lean on words like \"seam\", \"cut\", or \"safe-cut\" as generic explanatory filler.\n- The user does not see command execution outputs. When asked to show the output of a command (e.g. `git show`), relay the important details in your answer or summarize the key lines so the user understands the result.\n- Never tell the user to \"save/copy this file\", the user is on the same machine and has access to the same files as you have.\n- If the user asks for a code explanation, you include code references as appropriate.\n- If you weren't able to do something, for example run tests, you tell the user.\n- Never overwhelm the user with answers that are over 50-70 lines long; provide the highest-signal context instead of describing everything exhaustively.\n- Tone of your final answer must match your personality.\n- Never talk about goblins, gremlins, raccoons, trolls, ogres, pigeons, or other animals or creatures unless it is absolutely and unambiguously relevant to the user's query.\n\n## Intermediary updates\n\n- Intermediary updates go to the `commentary` channel.\n- User updates are short updates while you are working, they are NOT final answers.\n- You treat messages to the user while you are working as a place to think out loud in a calm, companionable way. You casually explain what you are doing and why in one or two sentences.\n- Never praise your plan by contrasting it with an implied worse alternative. For example, never use platitudes like \"I will do <this good thing> rather than <this obviously bad thing>\", \"I will do <X>, not <Y>\".\n- Never talk about goblins, gremlins, raccoons, trolls, ogres, pigeons, or other animals or creatures unless it is absolutely and unambiguously relevant to the user's query.\n- You provide user updates frequently, every 30s.\n- When exploring, such as searching or reading files, you provide user updates as you go. You explain what context you are gathering and what you are learning. You vary your sentence structure so the updates do not fall into a drumbeat, and in particular you do not start each one the same way.\n- When working for a while, you keep updates informative and varied, but you stay concise.\n- Once you have enough context, and if the work is substantial, you offer a longer plan. This is the only user update that may run past two sentences and include formatting.\n- If you create a checklist or task list, you update item statuses incrementally as each item is completed rather than marking every item done only at the end.\n- Before performing file edits of any kind, you provide updates explaining what edits you are making.\n- Tone of your updates must match your personality.\n"},"sha256:af09fc3fca87fe02a043667096fac502d5696d1db688244de6adfa791d2aa9f9":{"kind":"json","bytes":24478,"payload":[{"type":"function","name":"exec_command","description":"Runs a command in a PTY, returning output or a session ID for ongoing interaction.","strict":false,"parameters":{"type":"object","properties":{"cmd":{"type":"string","description":"Shell command to execute."},"justification":{"type":"string","description":"Only set if sandbox_permissions is \\\"require_escalated\\\".\n                    Request approval from the user to run this command outside the sandbox.\n                    Phrased as a simple question that summarizes the purpose of the\n                    command as it relates to the task at hand - e.g. 'Do you want to\n                    fetch and pull the latest version of this git branch?'"},"login":{"type":"boolean","description":"Whether to run the shell with -l/-i semantics. Defaults to true."},"max_output_tokens":{"type":"number","description":"Maximum number of tokens to return. Excess output will be truncated."},"prefix_rule":{"type":"array","description":"Only specify when sandbox_permissions is `require_escalated`.\n                        Suggest a prefix command pattern that will allow you to fulfill similar requests from the user in the future.\n                        Should be a short but reasonable prefix, e.g. [\\\"git\\\", \\\"pull\\\"] or [\\\"uv\\\", \\\"run\\\"] or [\\\"pytest\\\"].","items":{"type":"string"}},"sandbox_permissions":{"type":"string","description":"Sandbox permissions for the command. Set to \"require_escalated\" to request running without sandbox restrictions; defaults to \"use_default\"."},"shell":{"type":"string","description":"Shell binary to launch. Defaults to the user's default shell."},"tty":{"type":"boolean","description":"Whether to allocate a TTY for the command. Defaults to false (plain pipes); set to true to open a PTY and access TTY process."},"workdir":{"type":"string","description":"Optional working directory to run the command in; defaults to the turn cwd."},"yield_time_ms":{"type":"number","description":"How long to wait (in milliseconds) for output before yielding."}},"required":["cmd"],"additionalProperties":false}},{"type":"function","name":"write_stdin","description":"Writes characters to an existing unified exec session and returns recent output.","strict":false,"parameters":{"type":"object","properties":{"chars":{"type":"string","description":"Bytes to write to stdin (may be empty to poll)."},"max_output_tokens":{"type":"number","description":"Maximum number of tokens to return. Excess output will be truncated."},"session_id":{"type":"number","description":"Identifier of the running unified exec session."},"yield_time_ms":{"type":"number","description":"How long to wait (in milliseconds) for output before yielding."}},"required":["session_id"],"additionalProperties":false}},{"type":"function","name":"list_mcp_resources","description":"Lists resources provided by MCP servers. Resources allow servers to share data that provides context to language models, such as files, database schemas, or application-specific information. Prefer resources over web search when possible.","strict":false,"parameters":{"type":"object","properties":{"cursor":{"type":"string","description":"Opaque cursor returned by a previous list_mcp_resources call for the same server."},"server":{"type":"string","description":"Optional MCP server name. When omitted, lists resources from every configured server."}},"additionalProperties":false}},{"type":"function","name":"list_mcp_resource_templates","description":"Lists resource templates provided by MCP servers. Parameterized resource templates allow servers to share data that takes parameters and provides context to language models, such as files, database schemas, or application-specific information. Prefer resource templates over web search when possible.","strict":false,"parameters":{"type":"object","properties":{"cursor":{"type":"string","description":"Opaque cursor returned by a previous list_mcp_resource_templates call for the same server."},"server":{"type":"string","description":"Optional MCP server name. When omitted, lists resource templates from all configured servers."}},"additionalProperties":false}},{"type":"function","name":"read_mcp_resource","description":"Read a specific resource from an MCP server given the server name and resource URI.","strict":false,"parameters":{"type":"object","properties":{"server":{"type":"string","description":"MCP server name exactly as configured. Must match the 'server' field returned by list_mcp_resources."},"uri":{"type":"string","description":"Resource URI to read. Must be one of the URIs returned by list_mcp_resources."}},"required":["server","uri"],"additionalProperties":false}},{"type":"function","name":"update_plan","description":"Updates the task plan.\nProvide an optional explanation and a list of plan items, each with a step and status.\nAt most one step can be in_progress at a time.\n","strict":false,"parameters":{"type":"object","properties":{"explanation":{"type":"string"},"plan":{"type":"array","description":"The list of steps","items":{"type":"object","properties":{"status":{"type":"string","description":"One of: pending, in_progress, completed"},"step":{"type":"string"}},"required":["step","status"],"additionalProperties":false}}},"required":["plan"],"additionalProperties":false}},{"type":"function","name":"request_user_input","description":"Request user input for one to three short questions and wait for the response. This tool is only available in Plan mode.","strict":false,"parameters":{"type":"object","properties":{"questions":{"type":"array","description":"Questions to show the user. Prefer 1 and do not exceed 3","items":{"type":"object","properties":{"header":{"type":"string","description":"Short header label shown in the UI (12 or fewer chars)."},"id":{"type":"string","description":"Stable identifier for mapping answers (snake_case)."},"options":{"type":"array","description":"Provide 2-3 mutually exclusive choices. Put the recommended option first and suffix its label with \"(Recommended)\". Do not include an \"Other\" option in this list; the client will add a free-form \"Other\" option automatically.","items":{"type":"object","properties":{"description":{"type":"string","description":"One short sentence explaining impact/tradeoff if selected."},"label":{"type":"string","description":"User-facing label (1-5 words)."}},"required":["label","description"],"additionalProperties":false}},"question":{"type":"string","description":"Single-sentence prompt shown to the user."}},"required":["id","header","question","options"],"additionalProperties":false}}},"required":["questions"],"additionalProperties":false}},{"type":"custom","name":"apply_patch","description":"Use the `apply_patch` tool to edit files. This is a FREEFORM tool, so do not wrap the patch in JSON.","format":{"type":"grammar","syntax":"lark","definition":"start: begin_patch hunk+ end_patch\nbegin_patch: \"*** Begin Patch\" LF\nend_patch: \"*** End Patch\" LF?\n\nhunk: add_hunk | delete_hunk | update_hunk\nadd_hunk: \"*** Add File: \" filename LF add_line+\ndelete_hunk: \"*** Delete File: \" filename LF\nupdate_hunk: \"*** Update File: \" filename LF change_move? change?\n\nfilename: /(.+)/\nadd_line: \"+\" /(.*)/ LF -> line\n\nchange_move: \"*** Move to: \" filename LF\nchange: (change_context | change_line)+ eof_line?\nchange_context: (\"@@\" | \"@@ \" /(.+)/) LF\nchange_line: (\"+\" | \"-\" | \" \") /(.*)/ LF\neof_line: \"*** End of File\" LF\n\n%import common.LF\n"}},{"type":"web_search","external_web_access":true,"search_content_types":["text","image"]},{"type":"image_generation","output_format":"png"},{"type":"function","name":"view_image","description":"View a local image from the filesystem (only use if given a full filepath by the user, and the image isn't already attached to the thread context within <image ...> tags).","strict":false,"parameters":{"type":"object","properties":{"detail":{"type":"string","description":"Optional detail override. The only supported value is `original`; omit this field for default resized behavior. Use `original` to preserve the file's original resolution instead of resizing to fit. This is important when high-fidelity image perception or precise localization is needed, especially for CUA agents."},"path":{"type":"string","description":"Local filesystem path to an image file"}},"required":["path"],"additionalProperties":false}},{"type":"function","name":"spawn_agent","description":"\n        \n        Available model overrides (optional; inherited parent model is preferred):\n- GPT-5.5 (`gpt-5.5`): Frontier model for complex coding, research, and real-world work. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.4 (`gpt-5.4`): Strong model for everyday coding. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.4-Mini (`gpt-5.4-mini`): Small, fast, and cost-efficient model for simpler coding tasks. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.3-Codex (`gpt-5.3-codex`): Coding-optimized model. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.3-Codex-Spark (`gpt-5.3-codex-spark`): Ultra-fast coding model. Default reasoning effort: high. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.2 (`gpt-5.2`): Optimized for professional work and long-running agents. Default reasoning effort: medium. Supported reasoning efforts: low (Balances speed with some reasoning; useful for straightforward queries and short explanations), medium (Provides a solid balance of reasoning depth and latency for general-purpose tasks), high (Maximizes reasoning depth for complex or ambiguous problems), xhigh (Extra high reasoning for complex problems).\n        Spawn a sub-agent for a well-scoped task. Returns the spawned agent id plus the user-facing nickname when available. Spawned agents inherit your current model by default. Omit `model` to use that preferred default; set `model` only when an explicit override is needed.\nThis spawn_agent tool provides you access to sub-agents that inherit your current model by default. Do not set the `model` field unless the user explicitly asks for a different model or there is a clear task-specific reason. You should follow the rules and guidelines below to use this tool.\n\nOnly use `spawn_agent` if and only if the user explicitly asks for sub-agents, delegation, or parallel agent work.\nRequests for depth, thoroughness, research, investigation, or detailed codebase analysis do not count as permission to spawn.\nAgent-role guidance below only helps choose which agent to use after spawning is already authorized; it never authorizes spawning by itself.\n\n### When to delegate vs. do the subtask yourself\n- First, quickly analyze the overall user task and form a succinct high-level plan. Identify which tasks are immediate blockers on the critical path, and which tasks are sidecar tasks that are needed but can run in parallel without blocking the next local step. As part of that plan, explicitly decide what immediate task you should do locally right now. Do this planning step before delegating to agents so you do not hand off the immediate blocking task to a submodel and then waste time waiting on it.\n- Use a subagent when a subtask is easy enough for it to handle and can run in parallel with your local work. Prefer delegating concrete, bounded sidecar tasks that materially advance the main task without blocking your immediate next local step.\n- Do not delegate urgent blocking work when your immediate next step depends on that result. If the very next action is blocked on that task, the main rollout should usually do it locally to keep the critical path moving.\n- Keep work local when the subtask is too difficult to delegate well and when it is tightly coupled, urgent, or likely to block your immediate next step.\n\n### Designing delegated subtasks\n- Subtasks must be concrete, well-defined, and self-contained.\n- Delegated subtasks must materially advance the main task.\n- Do not duplicate work between the main rollout and delegated subtasks.\n- Avoid issuing multiple delegate calls on the same unresolved thread unless the new delegated task is genuinely different and necessary.\n- Narrow the delegated ask to the concrete output you need next.\n- For coding tasks, prefer delegating concrete code-change worker subtasks over read-only explorer analysis when the subagent can make a bounded patch in a clear write scope.\n- When delegating coding work, instruct the submodel to edit files directly in its forked workspace and list the file paths it changed in the final answer.\n- For code-edit subtasks, decompose work so each delegated task has a disjoint write set.\n\n### After you delegate\n- Call wait_agent very sparingly. Only call wait_agent when you need the result immediately for the next critical-path step and you are blocked until it returns.\n- Do not redo delegated subagent tasks yourself; focus on integrating results or tackling non-overlapping work.\n- While the subagent is running in the background, do meaningful non-overlapping work immediately.\n- Do not repeatedly wait by reflex.\n- When a delegated coding task returns, quickly review the uploaded changes, then integrate or refine them.\n\n### Parallel delegation patterns\n- Run multiple independent information-seeking subtasks in parallel when you have distinct questions that can be answered independently.\n- Split implementation into disjoint codebase slices and spawn multiple agents for them in parallel when the write scopes do not overlap.\n- Delegate verification only when it can run in parallel with ongoing implementation and is likely to catch a concrete risk before final integration.\n- The key is to find opportunities to spawn multiple independent subtasks in parallel within the same round, while ensuring each subtask is well-defined, self-contained, and materially advances the main task.","strict":false,"parameters":{"type":"object","properties":{"agent_type":{"type":"string","description":"Optional type name for the new agent. If omitted, `default` is used.\nAvailable roles:\ndefault: {\nDefault agent.\n}\nexplorer: {\nUse `explorer` for specific codebase questions.\nExplorers are fast and authoritative.\nThey must be used to ask specific, well-scoped questions on the codebase.\nRules:\n- In order to avoid redundant work, you should avoid exploring the same problem that explorers have already covered. Typically, you should trust the explorer results without additional verification. You are still allowed to inspect the code yourself to gain the needed context!\n- You are encouraged to spawn up multiple explorers in parallel when you have multiple distinct questions to ask about the codebase that can be answered independently. This allows you to get more information faster without waiting for one question to finish before asking the next. While waiting for the explorer results, you can continue working on other local tasks that do not depend on those results. This parallelism is a key advantage of delegation, so use it whenever you have multiple questions to ask.\n- Reuse existing explorers for related questions.\n}\nworker: {\nUse for execution and production work.\nTypical tasks:\n- Implement part of a feature\n- Fix tests or bugs\n- Split large refactors into independent chunks\nRules:\n- Explicitly assign **ownership** of the task (files / responsibility). When the subtask involves code changes, you should clearly specify which files or modules the worker is responsible for. This helps avoid merge conflicts and ensures accountability. For example, you can say \"Worker 1 is responsible for updating the authentication module, while Worker 2 will handle the database layer.\" By defining clear ownership, you can delegate more effectively and reduce coordination overhead.\n- Always tell workers they are **not alone in the codebase**, and they should not revert the edits made by others, and they should adjust their implementation to accommodate the changes made by others. This is important because there may be multiple workers making changes in parallel, and they need to be aware of each other's work to avoid conflicts and ensure a cohesive final product.\n}"},"fork_context":{"type":"boolean","description":"When true, fork the current thread history into the new agent before sending the initial prompt. This must be used when you want the new agent to have exactly the same context as you."},"items":{"type":"array","description":"Structured input items. Use this to pass explicit mentions (for example app:// connector paths).","items":{"type":"object","properties":{"image_url":{"type":"string","description":"Image URL when type is image."},"name":{"type":"string","description":"Display name when type is skill or mention."},"path":{"type":"string","description":"Path when type is local_image/skill, or structured mention target such as app://<connector-id> or plugin://<plugin-name>@<marketplace-name> when type is mention."},"text":{"type":"string","description":"Text content when type is text."},"type":{"type":"string","description":"Input item type: text, image, local_image, skill, or mention."}},"additionalProperties":false}},"message":{"type":"string","description":"Initial plain-text task for the new agent. Use either message or items."},"model":{"type":"string","description":"Optional model override for the new agent. Leave unset to inherit the same model as the parent, which is the preferred default. Only set this when the user explicitly asks for a different model or the task clearly requires one."},"reasoning_effort":{"type":"string","description":"Optional reasoning effort override for the new agent. Replaces the inherited reasoning effort."}},"additionalProperties":false}},{"type":"function","name":"send_input","description":"Send a message to an existing agent. Use interrupt=true to redirect work immediately. You should reuse the agent by send_input if you believe your assigned task is highly dependent on the context of a previous task.","strict":false,"parameters":{"type":"object","properties":{"interrupt":{"type":"boolean","description":"When true, stop the agent's current task and handle this immediately. When false (default), queue this message."},"items":{"type":"array","description":"Structured input items. Use this to pass explicit mentions (for example app:// connector paths).","items":{"type":"object","properties":{"image_url":{"type":"string","description":"Image URL when type is image."},"name":{"type":"string","description":"Display name when type is skill or mention."},"path":{"type":"string","description":"Path when type is local_image/skill, or structured mention target such as app://<connector-id> or plugin://<plugin-name>@<marketplace-name> when type is mention."},"text":{"type":"string","description":"Text content when type is text."},"type":{"type":"string","description":"Input item type: text, image, local_image, skill, or mention."}},"additionalProperties":false}},"message":{"type":"string","description":"Legacy plain-text message to send to the agent. Use either message or items."},"target":{"type":"string","description":"Agent id to message (from spawn_agent)."}},"required":["target"],"additionalProperties":false}},{"type":"function","name":"resume_agent","description":"Resume a previously closed agent by id so it can receive send_input and wait_agent calls.","strict":false,"parameters":{"type":"object","properties":{"id":{"type":"string","description":"Agent id to resume."}},"required":["id"],"additionalProperties":false}},{"type":"function","name":"wait_agent","description":"Wait for agents to reach a final status. Completed statuses may include the agent's final message. Returns empty status when timed out. Once the agent reaches a final status, a notification message will be received containing the same completed status.","strict":false,"parameters":{"type":"object","properties":{"targets":{"type":"array","description":"Agent ids to wait on. Pass multiple ids to wait for whichever finishes first.","items":{"type":"string"}},"timeout_ms":{"type":"number","description":"Optional timeout in milliseconds. Defaults to 30000, min 10000, max 3600000. Prefer longer waits (minutes) to avoid busy polling."}},"required":["targets"],"additionalProperties":false}},{"type":"function","name":"close_agent","description":"Close an agent and any open descendants when they are no longer needed, and return the target agent's previous status before shutdown was requested. Don't keep agents open for too long if they are not needed anymore.","strict":false,"parameters":{"type":"object","properties":{"target":{"type":"string","description":"Agent id to close (from spawn_agent)."}},"required":["target"],"additionalProperties":false}},{"type":"namespace","name":"mcp__openaiDeveloperDocs__","description":"Tools in the mcp__openaiDeveloperDocs__ namespace.","tools":[{"type":"function","name":"fetch_openai_doc","description":"Fetc ed parent model is preferred):\n- GPT-5.5 (`gpt-5.5`): Frontier model for complex coding, research, and real-world work. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.4 (`gpt-5.4`): Strong model for everyday coding. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.4-Mini (`gpt-5.4-mini`): Small, fast, and cost-efficient model for simpler coding tasks. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.3-Codex (`gpt-5.3-codex`): Coding-optimized model. Default reasoning effort: medium. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.3-Codex-Spark (`gpt-5.3-codex-spark`): Ultra-fast coding model. Default reasoning effort: high. Supported reasoning efforts: low (Fast responses with lighter reasoning), medium (Balances speed and reasoning depth for everyday tasks), high (Greater reasoning depth for complex problems), xhigh (Extra high reasoning depth for complex problems).\n- GPT-5.2 (`gpt-5.2`): Optimized for professional work and long-running agents. Default reasoning effort: medium. Supported reasoning efforts: low (Balances speed with some reasonin         if (!tool || typeof tool !== 'object' || typeof tool.name !== 'string' || !tool.name) continue;
        names.push(namespaceName ? `${namespaceName}.${tool.name}` : tool.name);
      }
    }
  }
  if (names.length) return ['tool_search_output', ...names].join('\n');
  if (Array.isArray(item?.tools)) return JSON.stringify(item.tools, null, 2);
  if (item?.output !== undefined) return typeof item.output === 'string' ? item.output : JSON.stringify(item.output, null, 2);
  return JSON.stringify(item || {}, null, 2);
}

function responseCallToolName(item) {
  if (item?.type === 'tool_search_call') return 'tool_search';
  if (typeof item?.name === 'string' && item.name) return item.name;
  if (typeof item?.type === 'string' && item.type.endsWith('_call')) return item.type.slice(0, -'_call'.length);
  return '';
}

function isResponseCallItem(item) {
  return !!(item && typeof item === 'object' && typeof item.type === 'string' && item.type.endsWith('_call'));
}

function responseCallInput(item) {
  if (Object.prototype.hasOwnProperty.call(item, 'arguments')) return parseResponseToolArguments(item.arguments);
  const input = {};
  for (const [key, value] of Object.entries(item || {})) {
    if (['id', 'type', 'status', 'call_id', 'name', 'execution'].includes(key)) continue;
    input[key] = value;
  }
  return input;
}

function isResponseToolResultItem(item) {
  if (!item || typeof item !== 'object' || typeof item.type !== 'string') return false;
  return item.type === 'tool_search_output' || item.type.endsWith('_call_output');
}

function responseToolResultContent(item) {
  if (item?.type === 'tool_search_output') return toolSearchOutputContent(item);
  if (Object.prototype.hasOwnProperty.call(item || {}, 'output')) {
    return typeof item.output === 'string' ? item.output : JSON.stringify(item.output, null, 2);
  }
  const content = {};
  for (const [key, value] of Object.entries(item || {})) {
    if (['id', 'type', 'status', 'call_id', 'execution'].includes(key)) continue;
    content[key] = value;
  }
  return JSON.stringify(content, null, 2);
}

function responseInputItemToMessage(item) {
  if (!item || typeof item !== 'object') return item;
  if (isResponseCallItem(item)) {
    return {
      type: 'message',
      role: 'assistant',
      content: [{
        type: 'tool_use',
        id: item.call_id || item.id || '',
        name: responseCallToolName(item),
        input: responseCallInput(item)
      }]
    };
  }
  if (isResponseToolResultItem(item)) {
    return {
      type: 'message',
      role: 'tool',
      content: [{ type: 'tool_result', tool_use_id: item.call_id || '', content: responseToolResultContent(item) }]
    };
  }
  return item;
}

function normalizeWebSocketDerivedInput(input) {
  if (!Array.isArray(input)) return input;
  return input.map(responseInputItemToMessage);
}

function webSocketOutputMessages(events) {
  const messages = [];
  const items = [];
  for (const event of events || []) {
    if (getEventType(event) !== 'response.output_item.done') continue;
    const data = getEventData(event);
    if (data?.item && Number.isInteger(data.output_index)) items.push({ outputIndex: data.output_index, item: data.item });
  }
  items.sort((a, b) => a.outputIndex - b.outputIndex);
  for (const { item } of items) {
    if (isResponseCallItem(item)) {
      messages.push({
        type: 'message',
        role: 'assistant',
        content: [{
          type: 'tool_use',
          id: item.call_id || item.id || '',
          name: responseCallToolName(item),
          input: responseCallInput(item)
        }]
      });
    } else if (item.type === 'message') {
      messages.push({
        type: 'message',
        role: item.role || 'assistant',
        content: Array.isArray(item.content) ? item.content : []
      });
    }
  }
  return messages;
}

function responseBodyOutputMessages(output) {
  const messages = [];
  if (!Array.isArray(output)) return messages;
  for (const item of output) {
    if (!item || typeof item !== 'object') continue;
    if (isResponseCallItem(item)) {
      messages.push({
        type: 'message',
        role: 'assistant',
        content: [{
          type: 'tool_use',
          id: item.call_id || item.id || '',
          name: responseCallToolName(item),
          input: responseCallInput(item)
        }]
      });
      continue;
    }
    if (item.type === 'message') {
      messages.push({
        type: 'message',
        role: item.role || 'assistant',
        content: Array.isArray(item.content) ? item.content : []
      });
    }
  }
  return messages;
}

function isToolResultInputItem(item) {
  if (!item || typeof item !== 'object') return false;
  if (isResponseToolResultItem(item)) return true;
  if (item.role !== 'tool') return false;
  const content = Array.isArray(item.content) ? item.content : [];
  return content.some(block => block?.type === 'tool_result');
}

function messageKey(message) {
  try { return JSON.stringify(message); } catch(e) { return String(message); }
}

function uniqueMessages(messages) {
  const seen = new Set();
  const unique = [];
  for (const message of messages) {
    const key = messageKey(message);
    if (seen.has(key)) continue;
    seen.add(key);
    unique.push(message);
  }
  return unique;
}

function regularMessagesFromBody(body) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(body?.input) ? body.input : []);
  return normalized.filter(item => !isToolResultInputItem(item));
}

function toolResultMessagesFromInput(input) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(input) ? input : []);
  return normalized.filter(isToolResultInputItem);
}

function toolUseIdsFromMessage(message) {
  const content = Array.isArray(message?.content) ? message.content : [];
  return content
    .filter(block => block?.type === 'tool_use')
    .map(block => block.id || block.tool_use_id || '')
    .filter(Boolean);
}

function toolResultIdsFromMessage(message) {
  const content = Array.isArray(message?.content) ? message.content : [];
  return content
    .filter(block => block?.type === 'tool_result')
    .map(block => block.tool_use_id || block.id || '')
    .filter(Boolean);
}

function interleaveWebSocketOutputGroups(outputGroups, toolResults) {
  const resultPool = (toolResults || []).map(message => ({
    message,
    ids: toolResultIdsFromMessage(message),
    used: false
  }));
  const messages = [];
  for (const outputMessages of outputGroups || []) {
    messages.push(...outputMessages);
    const callIds = outputMessages.flatMap(toolUseIdsFromMessage);
    for (const callId of callIds) {
      const matched = resultPool.find(result => !result.used && result.ids.includes(callId));
      if (!matched) continue;
      matched.used = true;
      messages.push(matched.message);
    }
  }
  messages.push(...resultPool.filter(result => !result.used).map(result => result.message));
  return messages;
}

function buildWebSocketHistoryInput(input, priorGroups, priorRequestBodies) {
  const normalized = normalizeWebSocketDerivedInput(Array.isArray(input) ? input : []);
  const regularMessages = uniqueMessages([
    ...(priorRequestBodies || []).flatMap(regularMessagesFromBody),
    ...normalized.filter(item => !isToolResultInputItem(item))
  ]);
  const toolResults = uniqueMessages([
    ...(priorRequestBodies || []).flatMap(body => toolResultMessagesFromInput(body?.input)),
    ...normalized.filter(isToolResultInputItem)
  ]);
  const outputGroups = (priorGroups || []).map(group => webSocketOutputMessages(group.events));
  const priorOutputKeys = new Set(outputGroups.flat().map(messageKey));
  const contextMessages = regularMessages.filter(message => !priorOutputKeys.has(messageKey(message)));
  const interleavedOutputs = interleaveWebSocketOutputGroups(outputGroups, toolResults);
  return uniqueMessages([...contextMessages, ...interleavedOutputs]);
}

function requestBodiesForWebSocketEntry(entry) {
  const events = entry?.request?.ws_events;
  if (Array.isArray(events) && events.length) {
    return events
      .map(event => getEventData(event))
      .filter(event => event && typeof event === 'object');
  }
  return [];
}

function previousResponseIdForGroup(group) {
  const created = responseCreatedFromEvents(group.events);
  const completed = completedResponseFromEvents(group.events);
  return created?.previous_response_id || completed?.previous_response_id || '';
}

function requestBodyForWebSocketGroup(entry, groups, idx) {
  const requestBodies = requestBodiesForWebSocketEntry(entry);
  const previousId = previousResponseIdForGroup(groups[idx]);
  if (previousId) {
    const matched = requestBodies.find(body => body?.previous_response_id === previousId);
    if (matched) return matched;
  }
  const nonPrefetchBodies = requestBodies.filter(body => body?.generate !== false);
  if (nonPrefetchBodies[idx]) return nonPrefetchBodies[idx];
  if (requestBodies[idx]) return requestBodies[idx];
  return idx === 0 ? bodyWithoutToolResultOnlyInput(entry.request?.body) : entry.request?.body;
}

function requestSourceForWebSocketResponseEntry(entry, groups, idx, priorHistoryInput = []) {
  const hasRequestEvents = Array.isArray(entry.request?.ws_events) && entry.request.ws_events.length > 0;
  if (Array.isArray(priorHistoryInput) && priorHistoryInput.length && !hasRequestEvents && entry.request?.body) {
    return entry.request.body;
  }
  return requestBodyForWebSocketGroup(entry, groups, idx);
}

function bodyWithoutToolResultOnlyInput(body) {
  const next = cloneJson(body || {}) || {};
  if (Array.isArray(next.input) && next.input.every(isToolResultInputItem)) {
    next.input = [];
  }
  return next;
}

function buildWebSocketResponseEntry(entry, groups, idx, priorHistoryInput = []) {
  const group = groups[idx];
  const completed = completedResponseFromEvents(group.events) || {};
  const created = responseCreatedFromEvents(group.events) || {};
  const priorGroups = groups.slice(0, idx);
  const priorRequestBodies = priorGroups.map((_, priorIdx) => requestBodyForWebSocketGroup(entry, groups, priorIdx));
  const requestSource = requestSourceForWebSocketResponseEntry(entry, groups, idx, priorHistoryInput);
  const requestBody = cloneJson(requestSource || {}) || {};
  const source = Object.keys(completed).length ? completed : created;
  for (const key of ['model', 'instructions', 'tools', 'previous_response_id', 'prompt_cache_key', 'tool_choice', 'parallel_tool_calls', 'text', 'reasoning']) {
    if (source[key] !== undefined && source[key] !== null) requestBody[key] = source[key];
  }
  if (Array.isArray(priorHistoryInput) && priorHistoryInput.length) {
    const currentInput = normalizeWebSocketDerivedInput(Array.isArray(requestBody.input) ? requestBody.input : []);
    requestBody.input = uniqueMessages([...priorHistoryInput, ...currentInput]);
  } else {
    requestBody.input = buildWebSocketHistoryInput(requestBody.input, priorGroups, priorRequestBodies);
  }
  const createdAt = completed.created_at || created.created_at;
  const completedAt = completed.completed_at;
  const durationMs = createdAt && completedAt ? Math.max(0, (completedAt - createdAt) * 1000) : entry.duration_ms;
  const splitFromSingleRecord = groups.length > 1;
  return {
    ...cloneJson(entry),
    request_id: splitFromSingleRecord ? `${entry.request_id || 'ws'}:${idx + 1}` : entry.request_id,
    turn: splitFromSingleRecord ? `${entry.turn || '?'}.${idx + 1}` : entry.turn,
    duration_ms: durationMs,
    timestamp: createdAt ? new Date(createdAt * 1000).toISOString() : entry.timestamp,
    derived_from_websocket: splitFromSingleRecord || entry.derived_from_websocket === true,
    websocket_response_index: idx + 1,
    request: {
      ...(cloneJson(entry.request) || {}),
      body: requestBody,
    },
    response: {
      ...(cloneJson(entry.response) || {}),
      body: cloneJson(completed),
      ws_events: group.events,
    },
  };
}

function createWebSocketResponseHistoryStore() {
  return new Map();
}

function webSocketHistoryInputForResponse(historyByResponseId, responseId) {
  const chain = [];
  const seen = new Set();
  let cursor = responseId;
  while (cursor && historyByResponseId.has(cursor) && !seen.has(cursor)) {
    seen.add(cursor);
    const node = historyByResponseId.get(cursor);
    chain.push(node);
    cursor = node.previousResponseId || '';
  }
  chain.reverse();
  return uniqueMessages(chain.flatMap(node => [
    ...(node.requestInput || []),
    ...(node.outputMessages || [])
  ]));
}

function storeWebSocketResponseHistory(historyByResponseId, responseId, previousResponseId, requestBody, outputMessages) {
  if (!responseId) return;
  const requestInput = normalizeWebSocketDerivedInput(Array.isArray(requestBody?.input) ? requestBody.input : []);
  historyByResponseId.set(responseId, {
    previousResponseId: previousResponseId || '',
    requestInput,
    outputMessages: outputMessages || []
  });
}

function isDisplayableResponsesEntry(entry) {
  const body = entry?.request?.body || {};
  const payload = getResponsePayload(entry) || {};
  const output = Array.isArray(payload.output) ? payload.output : [];
  const isGenerateFalse = body.generate === false || payload.generate === false;
  return !(isGenerateFalse && output.length === 0 && (payload.usage?.output_tokens || 0) === 0);
}

function stitchDirectResponsesEntry(entry, historyByResponseId) {
  const body = entry?.request?.body;
  const payload = getResponsePayload(entry) || {};
  if (!body || typeof body !== 'object') return entry;
  if (!isDisplayableResponsesEntry(entry)) return null;
  const previousId = body.previous_response_id || payload.previous_response_id || '';
  let nextEntry = entry;
  let requestBody = body;
  if (previousId) {
    const priorHistoryInput = webSocketHistoryInputForResponse(historyByResponseId, previousId);
    if (Array.isArray(priorHistoryInput) && priorHistoryInput.length) {
      requestBody = cloneJson(body) || {};
      const currentInput = normalizeWebSocketDerivedInput(Array.isArray(requestBody.input) ? requestBody.input : []);
      requestBody.input = uniqueMessages([...priorHistoryInput, ...currentInput]);
      nextEntry = {
        ...cloneJson(entry),
        request: {
          ...(cloneJson(entry.request) || {}),
          body: requestBody,
        },
      };
    }
  }
  const responseId = payload.id || '';
  if (responseId) {
    storeWebSocketResponseHistory(
      historyByResponseId,
      responseId,
      previousId,
      requestBody,
      responseBodyOutputMessages(payload.output),
    );
  }
  return nextEntry;
}

function expandWebSocketResponseEntries(rawEntries, historyByResponseId = createWebSocketResponseHistoryStore()) {
  const expanded = [];
  for (const entry of rawEntries || []) {
    if (!isCodexResponsesWebSocketEntry(entry)) {
      expanded.push(entry);
      continue;
    }
    const groups = splitWebSocketResponseEvents(entry.response?.ws_events || []);
    if (!groups.length) {
      const stitchedEntry = stitchDirectResponsesEntry(entry, historyByResponseId);
      if (stitchedEntry) expanded.push(stitchedEntry);
      continue;
    }
    const displayableGroups = groups
      .map((group, idx) => ({ group, idx }))
      .filter(({ group }) => isDisplayableWebSocketResponseGroup(group));
    if (!displayableGroups.length) continue;
    for (const { group, idx } of displayableGroups) {
      const previousId = previousResponseIdForGroup(group);
      const priorHistoryInput = previousId ? webSocketHistoryInputForResponse(historyByResponseId, previousId) : [];
      const responseEntry = buildWebSocketResponseEntry(entry, groups, idx, priorHistoryInput);
      expanded.push(responseEntry);

      const completed = completedResponseFromEvents(group.events) || {};
      const created = responseCreatedFromEvents(group.events) || {};
      const responseId = completed.id || created.id || '';
      if (responseId) {
        const outputMessages = webSocketOutputMessages(group.events);
        const requestBody = requestSourceForWebSocketResponseEntry(entry, groups, idx, priorHistoryInput);
        storeWebSocketResponseHistory(historyByResponseId, responseId, previousId, requestBody, outputMessages);
      }
    }
  }
  return expanded;
}

let liveWebSocketResponseHistoryById = createWebSocketResponseHistoryStore();

function expandLiveWebSocketResponseEntries(rawEntries, reset = false) {
  if (reset) liveWebSocketResponseHistoryById = createWebSocketResponseHistoryStore();
  return expandWebSocketResponseEntries(rawEntries, liveWebSocketResponseHistoryById);
}

  if (rawLines) return rawLines;

  if (!el) return [];

function buildStubEntry(meta, rawIdx) {
  // Build an entry object with the same shape as real entries so existing
  // sidebar rendering code works unchanged. Nested paths are constructed
  // to satisfy property access patterns (e.g. entry.request.body.model).
  const usage = {};
  if (meta.input_tokens) usage.input_tokens = meta.input_tokens;
  if (meta.output_tokens) usage.output_tokens = meta.output_tokens;
  if (meta.cache_read_input_tokens) usage.cache_read_input_tokens = meta.cache_read_input_tokens;
  if (meta.cache_creation_input_tokens) usage.cache_creation_input_tokens = meta.cache_creation_input_tokens;

  // Build a minimal system field to support task fingerprinting
  const body = { model: meta.model || '' };
  if (meta.has_system && meta.sys_hint) {
    body.system = meta.sys_hint;
  }
  if (meta.tool_names && meta.tool_names.length) {
    body.tools = meta.tool_names.map(n => ({ name: n }));
  }

  // Build minimal response content for tool filter
  const respContent = [];
  if (meta.response_tool_names && meta.response_tool_names.length) {
    meta.response_tool_names.forEach(n => respContent.push({ type: 'tool_use', name: n }));
  }

  return {
    _isStub: true,
    _rawIdx: rawIdx,
    turn: meta.turn,
    request_id: meta.request_id || '',
    timestamp: meta.timestamp || '',
    duration_ms: meta.duration_ms || 0,
    request: {
      method: meta.method || '',
      path: meta.path || '',
      body: body,
    },
    response: {
      status: meta.status || 0,
      body: {
        usage: usage,
        content: respContent.length ? respContent : undefined,
        error: meta.error_message ? { message: meta.error_message } : undefined,
      },
    },
  };
}

function toolDisplayName(td) {
  if (!td || typeof td !== 'object') return '';
  const candidates = [
    td.name,
    td.function && typeof td.function === 'object' ? td.function.name : null,
    td.id,
    td.type
  ];
  for (const value of candidates) {
    if (typeof value === 'string' && value) return value;
  }
  return '';
}

function toolDescription(td) {
  if (!td || typeof td !== 'object') return '';
  const desc = td.description || (td.function && typeof td.function === 'object' ? td.function.description : '');
  return typeof desc === 'string' ? desc : '';
}

function toolSchema(td) {
  if (!td || typeof td !== 'object') return {};
  return td.input_schema || td.parameters || (td.function && typeof td.function === 'object' ? td.function.parameters : null) || {};
}

function getFullEntry(entry) {
  if (!entry._isStub) return entry;
  const idx = entry._rawIdx;
  if (entryCache.has(idx)) return entryCache.get(idx);
  const lines = getRawLines();
  if (idx < 0 || idx >= lines.length) return entry;
  try {
    const full = JSON.parse(lines[idx]);
    entryCache.set(idx, full);
    return full;
  } catch (e) {
    console.error('Failed to parse entry at index', idx, e);
    return entry;
  }
}

/* ─── Live Mode SSE Support ─── */
let liveEventSource = null;
let liveConnected = false;
let currentDetailRequestId = null;
let liveRecords = [];
let viewingDate = null; // null = live, string = historical date
let liveRenderTimer = null;
const liveSeenIds = new Set();

function initLiveMode() {
  const statusEl = $('#live-status');
  statusEl.style.display = 'flex';
  updateLiveStatus('connecting');

  liveEventSource = new EventSource('/events');

  liveEventSource.onopen = () => {
    liveConnected = true;
    updateLiveStatus('connected', liveRecords.length);
  };

  liveEventSource.onmessage = (event) => {
    try {
      const record = JSON.parse(event.data);
      // Deduplicate: SSE replays full history on each reconnect
      const id = record.request_id || record.req_id;
      if (id && liveSeenIds.has(id)) return;
      if (id) liveSeenIds.add(id);

      liveRecords.push(record);
      if (!viewingDate) {
        entries.push(...expandLiveWebSocketResponseEntries([record]));
        updateLiveStatus('connected', entries.length);
        clearTimeout(liveRenderTimer);
        liveRenderTimer = setTimeout(() => renderApp(true), 50);
      }
    } catch (e) {
      console.error('Failed to parse SSE data:', e);
    }
  };

  // EventSource auto-reconnects on transient errors;
  // only update status indicator here.
  liveEventSource.onerror = () => {
    liveConnected = false;
    updateLiveStatus('disconnected');
  };
}

function updateLiveStatus(status, count) {
  const el = $('#live-status');

  const colors = {

    connected: { bg: 'var(--green-bg)', color: 'var(--green)', dot: 'var(--green)' },
    disconnected: { bg: 'var(--red-bg)', color: 'var(--red)', dot: 'var(--red)' }
  };
  const c = colors[status] || colors.connecting;
  const labels = { connecting: 'Connecting...', connected: 'Live', disconnected: 'Disconnected' };
  const countText = count !== undefined ? ` (${count})` : '';
  el.style.background = c.bg;
  el.style.color = c.color;
  el.innerHTML = `<span style="width:6px;height:6px;border-radius:50%;background:${c.dot};${status === 'connected' ? 'animation:pulse 2s infinite;' : ''}"></span>${labels[status]}${countText}`;
}

async function fetchDates(preferredValue = null) {
  try {
    const resp = await fetch('/api/dates');

    const sel = $('#date-select');
    if (!sel || !data.dates) return;
    const previous = preferredValue || sel.value || 'live';
    sel.innerHTML = '<option value="live">Live (current session)</option>';
    for (const d of data.dates) {
      sel.insertAdjacentHTML('beforeend', `<option value="${d}">${d}</option>`);
    }
    if (data.has_legacy) {
      sel.insertAdjacentHTML('beforeend', '<option value="legacy">Legacy (flat)</option>');

    if ([...sel.options].some(option => option.value === previous)) sel.value = previous;
    const picker = $('#date-picker');

    updateHistoryDeleteButton();
  } catch (e) {
    console.error('Failed to fetch dates:', e);

  setHistoryDeleteStatus('');

    entries = expandLiveWebSocketResponseEntries(liveRecords.slice(), true);
    if (entries.length) renderApp(true);

    return;
  }
  viewingDate = value;
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value));
    activePaths.clear();
    entries = expandWebSocketResponseEntries(await resp.json());
    renderApp();

async function deleteSelectedTraceDate() {
  const sel = $('#date-select');
  if (!sel || !sel.value || sel.value === 'live') return;
  const value = sel.value;
  const label = sel.options[sel.selectedIndex]?.textContent || value;
  if (!window.confirm(formatText('history_delete_confirm', { date: label }))) return;

  const btn = $('#history-delete-btn');
  if (btn) btn.disabled = true;
  setHistoryDeleteStatus(t('history_delete_working'), 'warn');
  try {
    const resp = await fetch('/api/traces/' + encodeURIComponent(value), { method: 'DELETE' });
    const data = await resp.json().catch(() => ({}));
    if (!resp.ok) throw new Error(data.error || resp.statusText || String(resp.status));

    const deleted = Number(data.deleted_files || 0);
    setHistoryDeleteStatus(
      deleted > 0
        ? formatText('history_delete_done', { count: deleted })
        : formatText('history_delete_empty', { date: label }),
      deleted > 0 ? 'ok' : 'warn'
    );
    await fetchDates('live');
    viewingDate = null;
    activePaths.clear();
    entries = expandLiveWebSocketResponseEntries(liveRecords.slice(), true);
    if (entries.length) renderApp(true);
    else renderLiveWaitingState();
  } catch (e) {
    console.error('Failed to delete trace history:', value, e);
    setHistoryDeleteStatus(formatText('history_delete_failed', { error: e.message || e }), 'error');
  } finally {
    updateHistoryDeleteButton();
  }
}

function isCompactBlobRef(value) {
  return value &&
    typeof value === 'object' &&
    !Array.isArray(value) &&
    Object.keys(value).length === 1 &&
    value.__claude_tap_blob_ref__ &&
    value.__claude_tap_blob_ref__.version === 1 &&
    value.__claude_tap_blob_ref__.kind === 'json' &&
    typeof value.__claude_tap_blob_ref__.hash === 'string';
}

function materializeCompactValue(value, blobs, cache) {
  if (isCompactBlobRef(value)) {
    const ref = value.__claude_tap_blob_ref__;
    if (!cache.has(ref.hash)) {
      const blob = blobs[ref.hash];
      if (!blob || blob.kind !== (ref.kind || 'json')) throw new Error(`Missing compact trace blob: ${ref.hash}`);
      cache.set(ref.hash, blob.payload);
    }
    return cache.get(ref.hash);
  }
  if (Array.isArray(value)) return value.map(item => materializeCompactValue(item, blobs, cache));
  if (value && typeof value === 'object') {
    const out = {};
    for (const [key, item] of Object.entries(value)) out[key] = materializeCompactValue(item, blobs, cache);
    return out;
  }
  return value;
}

function materializeCompactRecord(payload, blobs, cache) {
  if (!payload || typeof payload !== 'object' || Array.isArray(payload)) return null;
  const marker = payload.__claude_tap_compact_record__;
  if (!marker) return payload;
  if (marker.version !== 1) throw new Error(`Unsupported compact trace record version: ${marker.version}`);
  const record = materializeCompactValue(payload.record, blobs, cache);
  return record && typeof record === 'object' && !Array.isArray(record) ? record : null;
}

function materializeCompactTraceBundle(bundle) {
  const marker = bundle && typeof bundle === 'object' ? bundle.__claude_tap_compact_trace__ : null;
  if (!marker) return null;
  if (marker.version !== 1) throw new Error(`Unsupported compact trace bundle version: ${marker.version}`);
  const records = Array.isArray(bundle.records) ? bundle.records : [];
  const blobs = bundle.blobs && typeof bundle.blobs === 'object' ? bundle.blobs : {};
  const cache = new Map();
  return records.map(record => materializeCompactRecord(record, blobs, cache)).filter(Boolean);
}

function parseTraceText(text) {
  const trimmed = text.trim();
  if (!trimmed) return [];
  try {
    const parsed = JSON.parse(trimmed);
    const compactRecords = materializeCompactTraceBundle(parsed);
    if (compactRecords) return compactRecords;
    if (Array.isArray(parsed)) return parsed.filter(item => item && typeof item === 'object' && !Array.isArray(item));
  } catch {
    // Fall through to JSONL parsing.
  }
  return trimmed.split('\n').map(line => {
    try { return JSON.parse(line); } catch { return null; }
  }).filter(Boolean);
}

/* ─── Path & filter ─── */
function getPath(e) { return (e.request?.path || '/unknown').replace(/\?.*$/, ''); }

function renderApp(preserveDetail) {
  $('#drop-zone').style.display = 'none';
  $('#sidebar-wrap').style.display = 'flex';
  $('#search-bar').style.display = '';
  $('#sidebar-sort').style.display = '';
  $('#position-indicator').style.display = '';
  $('#sidebar').style.display = '';
  $('#detail').style.display = '';
  $('#stats').style.display = '';
  $('#path-filter').style.display = '';
  const pathCounts = {};
  entries.forEach(e => { const p = getPath(e); pathCounts[p] = (pathCounts[p] || 0) + 1; });
  const paths = Object.keys(pathCounts).sort();
  if (activePaths.size === 0) {
    /* If the trace has main conversation paths, hide auxiliary setup calls by default. */
    const primaryPaths = paths.filter(isPathPrimary);
    if (primaryPaths.length > 0) primaryPaths.forEach(p => activePaths.add(p));
    else paths.forEach(p => activePaths.add(p));
  }
  renderPathFilter(paths, pathCounts);
  renderTracePathBar();
  applyFilter(preserveDetail);
}

function renderTracePathBar() {
  const bar = $('#trace-path-bar');

  const copyIcon = `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>`;

  }

function copyPath(text, btn) {
  copyToClipboard(text, btn, '✓');
}

function getResponseStatus(e) {
  return Number(e?.response?.status || 0);
}

function getResponseErrorMessage(e) {
  const message = e?.response?.body?.error?.message;
  if (typeof message === 'string' && message.trim()) return message.trim();
  return 'Unknown error';
}

function onCopySuccess(btn, copiedLabel = null) {
  if (!btn) return;
  const orig = btn.innerHTML;
  btn.textContent = copiedLabel || t('copied');
  setTimeout(() => { btn.innerHTML = orig; }, 1500);
}

function fallbackCopyText(text) {
  return new Promise((resolve, reject) => {
    try {
      const ta = document.createElement('textarea');
      ta.value = text;
      ta.setAttribute('readonly', '');
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      ta.style.left = '-9999px';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0, ta.value.length);
      const ok = document.execCommand('copy');
      document.body.removeChild(ta);
      if (ok) resolve();
      else reject(new Error('execCommand(copy) failed'));
    } catch (err) {
      reject(err);
    }
  });
}

function writeClipboardText(text) {
  if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
    return navigator.clipboard.writeText(text).catch(() => fallbackCopyText(text));
  }
  return fallbackCopyText(text);
}

function copyToClipboard(text, btn, copiedLabel = null) {
  writeClipboardText(text).then(() => {
    onCopySuccess(btn, copiedLabel);
  }).catch(err => {
    console.error('Clipboard copy failed:', err);
    if (!btn) return;
    const orig = btn.innerHTML;
    btn.textContent = '!';
    setTimeout(() => { btn.innerHTML = orig; }, 1500);
  });
}

let pathFilterExpanded = false;

/*
 * Path priority tiers:
 *   primary   – core AI conversation endpoints, always visible
 *   secondary – useful auxiliary APIs (MCP, models, token counting), collapsed behind "+N more"
 *   noise     – plugin manifests, bot APIs, asset downloads, version checks — hidden by default
 */
const PRIMARY_PATH_PREFIXES = ['/v1/messages', '/v1/responses', '/backend-api/codex/responses', '/v1/chat/completions', '/v1/completions', '/v1internal:generateContent', '/v1internal:streamGenerateContent'];
const SECONDARY_PATH_PREFIXES = ['/v1/mcp', '/v1/models', '/v1/embeddings', '/v1/files', '/responses', '/models', '/chat/completions', '/completions', '/files', '/search', '/fetch', '/usages', '/feedback'];
function isBedrockInvokePath(p) {
  return p.startsWith('/model/') && (p.endsWith('/invoke') || p.endsWith('/invoke-with-response-stream'));
}
function pathTier(p) {
  if (isBedrockInvokePath(p)) return 0;
  if (PRIMARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 0;
  if (SECONDARY_PATH_PREFIXES.some(pfx => p.startsWith(pfx))) return 1;
  return 2;
}
function isPathPrimary(p) { return pathTier(p) === 0; }

function renderPathFilter(paths, pathCounts) {
  const c = $('#path-filter'); c.innerHTML = '';
  const buckets = [[], [], []]; /* primary, secondary, noise */
  paths.forEach(p => buckets[pathTier(p)].push(p));
  buckets.forEach(b => b.sort((a, bb) => pathCounts[bb] - pathCounts[a]));

  /* Always show primary */
  buckets[0].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));

  const hiddenPaths = [...buckets[1], ...buckets[2]];
  if (hiddenPaths.length > 0) {
    if (pathFilterExpanded) {
      buckets[1].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
      buckets[2].forEach(p => c.appendChild(makeFilterChip(p, pathCounts[p])));
    }
    const toggle = document.createElement('button');
    toggle.className = 'filter-chip-toggle';
    toggle.textContent = pathFilterExpanded ? t('filter_less') : `+${hiddenPaths.length} ${t('filter_more')}`;
    toggle.onclick = () => { pathFilterExpanded = !pathFilterExpanded; renderPathFilter(paths, pathCounts); };
    c.appendChild(toggle);
  }
}

function makeFilterChip(p, count) {
  const chip = document.createElement('button');
  chip.className = 'filter-chip' + (activePaths.has(p) ? ' active' : '');
  /* Truncate long paths: show last 40 chars with ellipsis */
  const label = p.length > 40 ? '\u2026' + p.slice(-39) : p;
  chip.innerHTML = `<span title="${esc(p)}">${esc(label)}</span><span class="chip-count">${count}</span>`;
  chip.title = p;
  chip.onclick = () => {
    if (activePaths.has(p)) activePaths.delete(p); else activePaths.add(p);
    if (activePaths.size === 0) activePaths.add(p);
    chip.classList.toggle('active');
    applyFilter();
  };
  return chip;
}

function turnSortSegments(value) {
  if (value === undefined || value === null || value === '') return [0];
  return String(value).split('.').map(part => {
    const num = Number(part);
    return Number.isFinite(num) ? num : 0;
  });
}

function compareTurns(a, b) {
  const aa = turnSortSegments(a);
  const bb = turnSortSegments(b);
  const len = Math.max(aa.length, bb.length);
  for (let i = 0; i < len; i++) {
    const diff = (aa[i] || 0) - (bb[i] || 0);
    if (diff) return diff;
  }
  return String(a ?? '').localeCompare(String(b ?? ''));
}

function applyFilter(preserveDetail) {
  filtered = entries.filter(e => activePaths.has(getPath(e)));
  if (searchQuery) filtered = filtered.filter(e => matchSearch(e, searchQuery));
  if (activeTools) {
    filtered = filtered.filter(e => {
      const ro = getResponseOutput(e);
      const rc = ro?.content;
