name: Legibility

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  legibility:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run deterministic legibility checks
        run: python scripts/check_legibility.py
