name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Read version from pyproject.toml
        id: version
        run: |
          project_version=$(python3 -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])")
          echo "pyproject_version=$project_version" >> "$GITHUB_OUTPUT"

      - name: Validate tag matches project version
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="${{ steps.version.outputs.pyproject_version }}"

          if [ "$tag_version" != "$project_version" ]; then
            echo "Tag version ($tag_version) does not match pyproject.toml version ($project_version)."
            exit 1
          fi

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current_tag="$GITHUB_REF_NAME"
          previous_tag=$(git tag --sort=-creatordate | grep '^v' | grep -vx "$current_tag" | head -n1 || true)

          {
            echo "## Changes"
            echo
            if [ -n "$previous_tag" ]; then
              git log --pretty=format:'- %s (%h)' "$previous_tag..$current_tag"
            else
              git log --pretty=format:'- %s (%h)' "$current_tag"
            fi
          } > release_notes.md

          if ! grep -q '^- ' release_notes.md; then
            echo "- Release $current_tag" >> release_notes.md
          fi

          gh release create "$current_tag" \
            --verify-tag \
            --title "$current_tag" \
            --notes-file release_notes.md

      - name: Verify PyPI install
        run: |
          version="${{ steps.version.outputs.pyproject_version }}"
          python3 -m pip install --upgrade pip

          for attempt in 1 2 3 4 5; do
            echo "Attempt $attempt/5: pip install claude-tap==$version"
            if python3 -m pip install "claude-tap==$version"; then
              python3 -c "from importlib import metadata; assert metadata.version('claude-tap') == '$version'"
              exit 0
            fi

            if [ "$attempt" -eq 5 ]; then
              echo "Failed to install claude-tap==$version from PyPI after 5 attempts."
              exit 1
            fi

            sleep 30
          done
