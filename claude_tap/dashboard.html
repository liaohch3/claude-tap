<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>claude-tap dashboard</title>
<style>
:root {
  --bg: #f4f5f7;
  --bg-card: #ffffff;
  --bg-hover: #f0f1f4;
  --bg-active: #e8ecf4;
  --bg-code: #f6f8fa;
  --border: #e2e4e9;
  --border-light: #edeef1;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
  --radius: 10px;
  --radius-sm: 6px;

  --text: #1c2024;
  --text-secondary: #60646c;
  --text-tertiary: #a0a4ab;

  --blue: #3b82f6;
  --blue-bg: #eff6ff;
  --green: #10b981;
  --green-bg: #ecfdf5;
  --amber: #f59e0b;
  --amber-bg: #fffbeb;
  --red: #ef4444;
  --red-bg: #fef2f2;
  --purple: #8b5cf6;
  --purple-bg: #f5f3ff;
  --cyan: #06b6d4;
  --cyan-bg: #ecfeff;
  --orange: #f97316;
  --orange-bg: #fff7ed;
  --indigo: #6366f1;

  --mono: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', 'Consolas', monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', Roboto, sans-serif;
}

[data-theme="dark"] {
  --bg: #0d1117;
  --bg-card: #161b22;
  --bg-hover: #1c2128;
  --bg-active: #252c35;
  --bg-code: #1c2128;
  --border: #30363d;
  --border-light: #21262d;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.3);
  --shadow-md: 0 2px 8px rgba(0,0,0,0.4);
  --text: #e6edf3;
  --text-secondary: #8b949e;
  --text-tertiary: #6e7681;
  --blue: #58a6ff;
  --blue-bg: #0d2240;
  --green: #3fb950;
  --green-bg: #0d2d1a;
  --amber: #d29922;
  --amber-bg: #2d2200;
  --red: #f85149;
  --red-bg: #3d1117;
  --purple: #bc8cff;
  --purple-bg: #1f1338;
  --cyan: #39d2c0;
  --cyan-bg: #0a2e2c;
  --orange: #f0883e;
  --orange-bg: #2d1b00;
  --indigo: #8b8fff;
}

*,*::before,*::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
}
button, input, select { font: inherit; }
button { cursor: pointer; }

.header {
  display: flex; align-items: center; gap: 16px;
  padding: 0 20px; min-height: 52px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0; z-index: 10;
}
.header .logo { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.header .logo svg { width: 22px; height: 22px; }
.header .logo span { font-size: 14px; font-weight: 600; color: var(--text); letter-spacing: -0.3px; }
.header .divider { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }
.path-filter { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; min-width: 0; flex: 1 1 0; }
.filter-chip {
  font-size: 12px; font-family: var(--mono); padding: 4px 10px; border-radius: 20px;
  border: 1px solid var(--border); background: var(--bg-card); color: var(--text-secondary);
  transition: all .15s; white-space: nowrap; line-height: 1;
}
.filter-chip:hover { border-color: var(--blue); color: var(--blue); }
.filter-chip.active { background: var(--blue); border-color: var(--blue); color: #fff; }
.filter-chip .chip-count { font-size: 10px; margin-left: 4px; opacity: .68; }
.stats {
  margin-left: auto; display: flex; gap: 16px; font-size: 12px; color: var(--text-tertiary); flex-shrink: 0;
}
.stats .stat-group { display: flex; align-items: center; gap: 4px; }
.stats .stat-val { font-weight: 600; color: var(--text-secondary); font-family: var(--mono); }
.live-status {
  display: flex; align-items: center; gap: 6px;
  padding: 4px 10px; border-radius: 12px;
  color: var(--green); background: var(--green-bg);
  font-size: 12px; font-weight: 500;
}
.live-status::before {
  content: ""; width: 6px; height: 6px; border-radius: 50%; background: currentColor;
}
.theme-toggle {
  background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 4px 8px; color: var(--text-secondary); display: flex; align-items: center;
  transition: all .15s; font-size: 14px; line-height: 1;
}
.theme-toggle:hover { border-color: var(--blue); color: var(--blue); }

.trace-path-bar {
  display: flex; align-items: center; gap: 6px; padding: 4px 12px;
  background: var(--bg); border-bottom: 1px solid var(--border);
  font-size: 11px; color: var(--text-tertiary); font-family: var(--mono);
  flex-shrink: 0;
}
.trace-path-bar .tp-label { font-family: var(--sans); font-weight: 500; color: var(--text-secondary); flex-shrink: 0; }
.trace-path-bar .tp-val { flex: 1 1 0; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; direction: rtl; text-align: left; }
.trace-path-bar .tp-sep { width: 1px; height: 14px; background: var(--border); flex-shrink: 0; }
.trace-path-bar .tp-copy {
  flex-shrink: 0; border: none; background: none;
  color: var(--text-tertiary); padding: 2px 4px; border-radius: 3px; line-height: 1;
}
.trace-path-bar .tp-copy:hover { color: var(--blue); background: var(--blue-bg); }

.main {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow-y: auto;
  min-height: 0;
  background: var(--bg);
  padding: 14px 20px 20px;
}
.main::-webkit-scrollbar { width: 6px; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.list-view,
.detail-view {
  display: flex;
  flex-direction: column;
  min-height: 0;
}
.dashboard-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.dashboard-title {
  color: var(--text-secondary);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: .02em;
}
.dashboard-clock {
  margin-left: auto;
  color: var(--red);
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: .18em;
  white-space: nowrap;
}
.control-panel {
  display: grid;
  grid-template-columns: minmax(190px, 260px) minmax(160px, 210px) minmax(260px, 1fr) auto;
  gap: 10px;
  align-items: center;
  margin-bottom: 12px;
}
.control-field {
  display: flex;
  align-items: center;
  gap: 8px;
}
.control-label {
  color: var(--text-secondary);
  font-size: 12px;
  white-space: nowrap;
}
.history-select,
.session-search input {
  min-width: 0;
  width: 100%;
  padding: 7px 10px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: var(--bg-card);
  color: var(--text);
  font-size: 13px;
  outline: none;
}
.history-select:hover,
.session-search input:hover,
.session-search input:focus { border-color: var(--blue); }
.session-search { display: flex; align-items: center; min-width: 0; }
.history-refresh {
  display: inline-flex; align-items: center; justify-content: center;
  min-height: 32px; min-width: 38px; padding: 5px 12px;
  border: 1px solid var(--border); border-radius: 6px;
  background: var(--bg-card); color: var(--text-secondary);
  font-family: var(--mono); font-size: 12px; line-height: 1;
  transition: color .15s, border-color .15s, background .15s;
}
.history-refresh:hover { border-color: var(--blue); color: var(--blue); background: var(--blue-bg); }
.overview-card {
  display: grid;
  grid-template-columns: repeat(4, max-content);
  gap: 34px;
  align-items: start;
  min-height: 84px;
  padding: 20px 22px;
  margin-bottom: 14px;
  border: 1px solid #cfd8e7;
  border-radius: 8px;
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
}
[data-theme="dark"] .overview-card { border-color: var(--border); }
.metric-label {
  color: #5f6b7a;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: .08em;
}
[data-theme="dark"] .metric-label { color: var(--text-tertiary); }
.metric-value {
  margin-top: 8px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 21px;
  font-weight: 700;
  line-height: 1;
}
.table-panel {
  border: 1px solid #cfd8e7;
  border-radius: 8px;
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
  overflow: hidden;
  flex-shrink: 0;
}
[data-theme="dark"] .table-panel { border-color: var(--border); }
.table-scroll {
  max-height: min(55vh, 620px);
  overflow: auto;
}
.table-scroll::-webkit-scrollbar { width: 6px; height: 6px; }
.table-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.session-table {
  width: 100%;
  min-width: 1040px;
  border-collapse: collapse;
}
.session-table th {
  position: sticky;
  top: 0;
  z-index: 1;
  padding: 14px 16px;
  border-bottom: 1px solid #c1ccdc;
  background: var(--bg-card);
  color: #515b69;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .09em;
  text-align: left;
  text-transform: uppercase;
}
[data-theme="dark"] .session-table th {
  border-bottom-color: var(--border);
  color: var(--text-tertiary);
}
.session-table td {
  padding: 13px 16px;
  border-bottom: 1px solid #d8dfeb;
  color: var(--text);
  font-size: 13px;
  vertical-align: middle;
}
[data-theme="dark"] .session-table td { border-bottom-color: var(--border-light); }
.session-table tr:last-child td { border-bottom: 0; }
.session-row {
  cursor: pointer;
  transition: background .12s;
}
.session-row:hover { background: var(--bg-hover); }
.session-row.active { background: var(--blue-bg); }
.session-row.active td:first-child { box-shadow: inset 3px 0 0 var(--blue); }
.mono-cell {
  color: var(--text-secondary);
  font-family: var(--mono);
  white-space: nowrap;
}
.first-message {
  max-width: 460px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 600;
}
.trace-count {
  color: var(--text-secondary);
  font-family: var(--mono);
  font-weight: 600;
}
.token-pill,
.model-pill,
.agent-pill,
.status-pill,
.live-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 24px;
  padding: 3px 10px;
  border-radius: 4px;
  font-family: var(--mono);
  font-size: 12px;
  font-weight: 700;
  line-height: 1;
  white-space: nowrap;
}
.token-pill {
  color: #c45a11;
  background: #fff8ea;
  border: 1px solid #ffd99b;
}
.model-pill {
  max-width: 260px;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #6d3dff;
  background: #f4f0ff;
  border: 1px solid #d8caff;
}
.agent-pill {
  color: var(--blue);
  background: var(--blue-bg);
  border: 1px solid color-mix(in srgb, var(--blue) 28%, transparent);
}
.status-pill.ok,
.status-pill.live {
  color: #18a449;
  background: #eafbf1;
  border: 1px solid #9ee6b4;
}
.status-pill.err {
  color: #ef3350;
  background: #fff0f3;
  border: 1px solid #ffb5c1;
}
.status-pill.empty-status {
  color: #c57a00;
  background: #fff8e7;
  border: 1px solid #ffdca3;
}
[data-theme="dark"] .token-pill { color: var(--orange); background: var(--orange-bg); border-color: #6f3b0c; }
[data-theme="dark"] .model-pill { color: var(--purple); background: var(--purple-bg); border-color: #4a2d83; }
[data-theme="dark"] .status-pill.ok,
[data-theme="dark"] .status-pill.live { color: var(--green); background: var(--green-bg); border-color: #1e6a37; }
[data-theme="dark"] .status-pill.err { color: var(--red); background: var(--red-bg); border-color: #7a2730; }
[data-theme="dark"] .status-pill.empty-status { color: var(--amber); background: var(--amber-bg); border-color: #6f5200; }
.row-action {
  min-height: 26px;
  padding: 4px 10px;
  border: 1px solid var(--border);
  border-radius: 5px;
  background: var(--bg-card);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 12px;
  transition: background .15s, border-color .15s, color .15s;
}
.row-action:hover {
  border-color: var(--blue);
  background: var(--blue-bg);
}
.table-empty {
  padding: 28px 16px;
  text-align: center;
  color: var(--text-tertiary);
  font-size: 13px;
}

.detail-page-head {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}
.back-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 32px;
  padding: 5px 12px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--bg-card);
  color: var(--blue);
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1;
  transition: background .15s, border-color .15s;
}
.back-btn:hover {
  border-color: var(--blue);
  background: var(--blue-bg);
}
.detail-heading {
  min-width: 0;
  display: grid;
  gap: 3px;
}
.detail-title {
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
}
.detail-subtitle {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: var(--text-tertiary);
  font-family: var(--mono);
  font-size: 11px;
}

.detail {
  flex: none;
  overflow: visible;
  padding: 0;
  background: var(--bg);
}
.viewer-frame-wrap {
  height: calc(100vh - 148px);
  min-height: 640px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
  background: var(--bg-card);
  box-shadow: var(--shadow-sm);
}
.viewer-frame {
  width: 100%;
  height: 100%;
  border: 0;
  display: block;
  background: var(--bg-card);
}
.detail-fallback-note {
  margin-bottom: 10px;
  padding: 8px 10px;
  border: 1px solid var(--border);
  border-radius: 6px;
  background: var(--amber-bg);
  color: var(--amber);
  font-size: 12px;
}
.detail::-webkit-scrollbar { width: 6px; }
.detail::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.empty {
  display: grid; place-items: center; min-height: 360px;
  color: var(--text-tertiary); font-size: 13px;
}
.detail-inspector-bar {
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
  margin: 0 0 10px;
  padding: 6px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 4px 16px rgba(15, 23, 42, 0.07);
}
[data-theme="dark"] .detail-inspector-bar {
  background: rgba(22, 27, 34, 0.9);
  border-color: #3a4048;
  box-shadow: 0 4px 16px rgba(0, 0, 0, 0.28);
}
.detail-tabs { display: inline-flex; align-items: center; gap: 3px; flex-wrap: wrap; min-width: 0; }
.detail-tab {
  display: inline-flex; align-items: center; gap: 6px;
  min-height: 30px; padding: 5px 10px;
  border: 1px solid transparent; border-radius: 6px;
  background: transparent; color: var(--text-secondary);
  font-family: var(--mono); font-size: 11px; line-height: 1;
  transition: color .15s, border-color .15s, background .15s;
}
.detail-tab:hover { color: var(--blue); border-color: var(--border); background: var(--bg-hover); }
.detail-tab.active {
  color: var(--blue);
  border-color: color-mix(in srgb, var(--blue) 45%, transparent);
  background: var(--blue-bg);
}
.action-bar {
  display: inline-flex; align-items: center; gap: 4px; flex-wrap: wrap;
  margin-left: auto;
}
.act-btn {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 4px 8px; border-radius: 6px;
  border: none; background: transparent;
  color: var(--text-secondary); font-family: var(--sans);
  transition: all .15s;
}
.act-btn:hover { background: var(--bg-hover); color: var(--blue); }
.session-summary {
  margin-bottom: 8px; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  background: var(--bg-card); box-shadow: var(--shadow-sm);
}
.session-summary-head {
  display: flex; align-items: center; gap: 8px;
  padding: 9px 12px;
  border-bottom: 1px solid var(--border-light);
}
.session-summary-title { font-size: 13px; font-weight: 600; color: var(--text); }
.session-summary-path {
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-tertiary); font-family: var(--mono); font-size: 11px; margin-left: auto;
}
.token-bar { display: flex; gap: 12px; font-size: 11px; padding: 8px 12px; flex-wrap: wrap; }
.tok-item { display: flex; align-items: center; gap: 4px; }
.tok-dot { width: 6px; height: 6px; border-radius: 50%; }
.tok-label { color: var(--text-tertiary); font-size: 11px; }
.tok-val { color: var(--text-secondary); font-weight: 600; font-family: var(--mono); font-size: 11px; }
.badge {
  display: inline-flex; align-items: center;
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg); color: var(--text-tertiary); font-weight: 500;
  white-space: nowrap;
}
.badge.active { background: var(--green-bg); color: var(--green); }
.badge.error { background: var(--red-bg); color: var(--red); }
.badge.empty { background: var(--amber-bg); color: var(--amber); }
.records { display: grid; gap: 8px; }
.section {
  margin-bottom: 0; border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  background: var(--bg-card); box-shadow: var(--shadow-sm);
}
.section-header {
  display: flex; align-items: center; padding: 8px 12px;
  gap: 8px; transition: background .1s;
}
.section-header .chevron { font-size: 10px; color: var(--text-tertiary); width: 12px; }
.section-header .title { font-size: 13px; font-weight: 600; color: var(--text); }
.section-header .path {
  min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  color: var(--text-tertiary); font-family: var(--mono); font-size: 11px;
}
.section-header .copy-btn,
.section-header .json-btn {
  font-size: 11px; padding: 3px 10px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-tertiary); margin-left: auto; transition: all .15s;
}
.section-header .json-btn:hover { color: var(--blue); border-color: var(--blue); }
.section-body { padding: 0 16px 16px; overflow-x: auto; }
.conversation { display: grid; gap: 8px; }
.msg {
  margin-bottom: 0; border-radius: var(--radius-sm);
  padding: 12px 16px; font-size: 13px; line-height: 1.6;
  border: 1px solid var(--border-light);
}
.msg.user { background: var(--blue-bg); border-color: #c7d2fe; }
.msg.assistant { background: var(--green-bg); border-color: #a7f3d0; }
[data-theme="dark"] .msg.user { border-color: #1f3a5f; }
[data-theme="dark"] .msg.assistant { border-color: #1a3a26; }
.msg-role {
  display: inline-block; font-size: 10px; font-weight: 700; text-transform: uppercase;
  letter-spacing: .5px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px;
}
.msg.user .msg-role { background: var(--blue); color: #fff; }
.msg.assistant .msg-role { background: var(--green); color: #fff; }
.content-block { margin-top: 8px; white-space: pre-wrap; word-break: break-word; }
.content-block:first-child { margin-top: 0; }
.json-view {
  display: none;
  margin-top: 10px;
  font-family: var(--mono); font-size: 12px; white-space: pre-wrap; word-break: break-word;
  max-height: 600px; overflow-y: auto; line-height: 1.55;
  background: var(--bg-code); color: var(--text);
  padding: 14px; border-radius: var(--radius-sm);
  border: 1px solid var(--border-light);
}
.json-view.open { display: block; }
pre {
  margin: 0;
  font-family: var(--mono);
  font-size: 12px;
  line-height: 1.55;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.hidden { display: none !important; }

@media (max-width: 900px) {
  body { overflow: auto; height: auto; min-height: 100vh; }
  .header { flex-wrap: wrap; padding: 10px 12px; }
  .stats { order: 4; width: 100%; flex-wrap: wrap; margin-left: 0; }
  .trace-path-bar { display: none; }
  .main { overflow: visible; padding: 12px; }
  .dashboard-title-row { flex-wrap: wrap; }
  .dashboard-clock { width: 100%; margin-left: 0; }
  .control-panel { grid-template-columns: 1fr; }
  .overview-card { grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 18px; }
  .table-scroll { max-height: none; }
  .detail-page-head { align-items: flex-start; }
  .viewer-frame-wrap { height: 78vh; min-height: 520px; }
}
</style>
</head>
<body>
<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span>claude-tap</span>
  </div>
  <div class="divider"></div>
  <div class="path-filter" id="agent-list"></div>
  <div class="stats">
    <div class="stat-group"><span>Sessions</span> <span class="stat-val" id="stat-sessions">0</span></div>
    <div class="stat-group"><span>Records</span> <span class="stat-val" id="stat-records">0</span></div>
    <div class="live-status"><span id="live-label">Watching</span></div>
  </div>
  <button class="theme-toggle" id="theme-toggle" title="Toggle dark mode">&#9790;</button>
</div>

<div class="trace-path-bar" id="trace-path-bar">
  <span class="tp-label">Dashboard</span>
  <span class="tp-val">trace history sessions</span>
</div>

<div class="main">
  <section id="list-view" class="list-view">
    <div class="dashboard-title-row">
      <h1 class="dashboard-title">Conversation Log</h1>
      <span class="dashboard-clock" id="dashboard-clock"></span>
    </div>

    <div class="control-panel">
      <label class="control-field">
        <span class="control-label">Date</span>
        <select id="date-filter" class="history-select"></select>
      </label>
      <label class="control-field">
        <span class="control-label">Status</span>
        <select id="status-filter" class="history-select">
          <option value="all">All status</option>
          <option value="active">Active</option>
          <option value="complete">Complete</option>
          <option value="error">Error</option>
          <option value="empty">Empty</option>
        </select>
      </label>
      <div class="session-search" role="search">
        <input id="search" type="search" placeholder="Search messages, agents, models, paths...">
      </div>
      <button id="refresh" class="history-refresh" title="Refresh">R</button>
    </div>

    <section class="overview-card" aria-label="Dashboard summary">
      <div class="metric">
        <div class="metric-label">Threads</div>
        <div class="metric-value" id="overview-threads">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Traces</div>
        <div class="metric-value" id="overview-traces">0</div>
      </div>
      <div class="metric">
        <div class="metric-label">Error Rate</div>
        <div class="metric-value" id="overview-error-rate">0.0%</div>
      </div>
      <div class="metric">
        <div class="metric-label">Total Tokens</div>
        <div class="metric-value" id="overview-tokens">0</div>
      </div>
    </section>

    <section class="table-panel" aria-label="Trace sessions">
      <div class="table-scroll">
        <table class="session-table">
          <thead>
            <tr>
              <th>Start Time</th>
              <th>First Message</th>
              <th>Traces</th>
              <th>Tokens</th>
              <th>Model</th>
              <th>Agent</th>
              <th>Status</th>
              <th>Detail</th>
            </tr>
          </thead>
          <tbody id="session-list"></tbody>
        </table>
      </div>
    </section>
  </section>

  <section id="detail-view" class="detail-view hidden">
    <div class="detail-page-head">
      <button id="back-to-list" class="back-btn" type="button">Back to sessions</button>
      <div class="detail-heading">
        <div class="detail-title" id="detail-title">Session detail</div>
        <div class="detail-subtitle" id="detail-subtitle">No session selected.</div>
      </div>
    </div>
    <section id="detail" class="detail">
      <div class="empty">Select a session to view details.</div>
    </section>
  </section>
</div>

<script>
const state = {
  sessions: [],
  selectedAgent: "all",
  selectedSessionId: null,
  view: "list",
  activeTab: "conversation",
  search: "",
  date: "all",
  status: "all",
};

const $ = selector => document.querySelector(selector);

function fmtNumber(value) {
  return Number(value || 0).toLocaleString();
}

function fmtTime(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  return date.toLocaleString();
}

function fmtTableTime(value) {
  if (!value) return "";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return value;
  const pad = number => String(number).padStart(2, "0");
  return [
    date.getFullYear(),
    pad(date.getMonth() + 1),
    pad(date.getDate()),
  ].join("-") + " " + [
    pad(date.getHours()),
    pad(date.getMinutes()),
    pad(date.getSeconds()),
  ].join(":");
}

function updateClock() {
  const clock = $("#dashboard-clock");
  if (clock) clock.textContent = fmtTableTime(new Date().toISOString());
}

function esc(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

async function fetchJSON(url) {
  const response = await fetch(url, {cache: "no-store"});
  if (!response.ok) throw new Error(`${response.status} ${response.statusText}`);
  return await response.json();
}

function filteredSessions() {
  const needle = state.search.trim().toLowerCase();
  return state.sessions.filter(session => {
    if (state.selectedAgent !== "all" && session.agent_key !== state.selectedAgent) return false;
    if (state.date !== "all" && session.date !== state.date) return false;
    if (state.status !== "all" && session.status !== state.status) return false;
    if (!needle) return true;
    const haystack = [
      session.agent,
      session.model,
      session.first_user,
      session.last_response,
      session.rel_trace_path,
      session.status,
    ].join(" ").toLowerCase();
    return haystack.includes(needle);
  });
}

async function refreshSessions({preserveSelection = true} = {}) {
  const payload = await fetchJSON("/api/sessions");
  state.sessions = payload.sessions || [];
  renderFilters();
  renderAgents();

  const visible = filteredSessions();
  const stillVisible = visible.some(session => session.id === state.selectedSessionId);
  if (!preserveSelection || !stillVisible) {
    state.selectedSessionId = null;
    state.view = "list";
  }
  renderSessions();
  if (state.view === "detail" && state.selectedSessionId) {
    showDetailView();
    await loadSession(state.selectedSessionId);
  } else {
    showListView();
  }
}

function renderFilters() {
  const dates = Array.from(new Set(state.sessions.map(session => session.date))).sort().reverse();
  const dateFilter = $("#date-filter");
  const current = state.date;
  dateFilter.innerHTML = '<option value="all">All dates</option>' + dates
    .map(date => `<option value="${esc(date)}">${esc(date)}</option>`)
    .join("");
  state.date = dates.includes(current) ? current : "all";
  dateFilter.value = state.date;

  const totalRecords = state.sessions.reduce((sum, session) => sum + session.record_count, 0);
  $("#stat-sessions").textContent = fmtNumber(state.sessions.length);
  $("#stat-records").textContent = fmtNumber(totalRecords);
}

function renderAgents() {
  const buckets = new Map();
  for (const session of state.sessions) {
    const bucket = buckets.get(session.agent_key) || {key: session.agent_key, label: session.agent, sessions: 0};
    bucket.sessions += 1;
    buckets.set(session.agent_key, bucket);
  }
  const agents = [{key: "all", label: "All agents", sessions: state.sessions.length}]
    .concat(Array.from(buckets.values()).sort((a, b) => a.label.localeCompare(b.label)));
  $("#agent-list").innerHTML = agents.map(agent => `
    <button class="filter-chip ${state.selectedAgent === agent.key ? "active" : ""}" data-agent="${esc(agent.key)}">
      <span>${esc(agent.label)}</span>
      <span class="chip-count">${fmtNumber(agent.sessions)}</span>
    </button>
  `).join("");
  document.querySelectorAll("[data-agent]").forEach(button => {
    button.addEventListener("click", () => {
      state.selectedAgent = button.dataset.agent;
      state.selectedSessionId = null;
      state.view = "list";
      renderAgents();
      renderSessions();
      showListView();
    });
  });
}

function renderSessions() {
  const sessions = filteredSessions();
  renderOverview(sessions);
  if (!sessions.length) {
    $("#session-list").innerHTML = '<tr><td class="table-empty" colspan="8">No matching trace sessions.</td></tr>';
    return;
  }

  $("#session-list").innerHTML = sessions.map(session => sessionRow(session)).join("");
  document.querySelectorAll("[data-session]").forEach(row => {
    row.addEventListener("click", event => {
      event.preventDefault();
      openSession(row.dataset.session);
    });
    row.addEventListener("keydown", event => {
      if (event.key === "Enter" || event.key === " ") {
        event.preventDefault();
        openSession(row.dataset.session);
      }
    });
  });
}

function sessionRow(session) {
  const preview = session.first_user || session.last_response || session.rel_trace_path;
  const status = statusInfo(session);
  return `
    <tr class="session-row ${state.selectedSessionId === session.id ? "active" : ""}" data-session="${esc(session.id)}" tabindex="0">
      <td class="mono-cell">${esc(fmtTableTime(session.started_at || session.updated_at))}</td>
      <td><div class="first-message" title="${esc(preview || "No captured messages yet.")}">${esc(preview || "No captured messages yet.")}</div></td>
      <td><span class="trace-count">${fmtNumber(session.record_count)}</span></td>
      <td><span class="token-pill">${fmtNumber(session.total_tokens)}</span></td>
      <td><span class="model-pill" title="${esc(session.model || "unknown")}">${esc(session.model || "unknown")}</span></td>
      <td><span class="agent-pill">${esc(session.agent || "unknown")}</span></td>
      <td><span class="status-pill ${status.className}">${esc(status.label)}</span></td>
      <td><button class="row-action" type="button" aria-label="View session details">Details</button></td>
    </tr>
  `;
}

function renderOverview(sessions) {
  const traces = sessions.reduce((sum, session) => sum + session.record_count, 0);
  const tokens = sessions.reduce((sum, session) => sum + session.total_tokens, 0);
  const errors = sessions.filter(session => session.status === "error").length;
  const errorRate = sessions.length ? `${((errors / sessions.length) * 100).toFixed(1)}%` : "0.0%";
  $("#overview-threads").textContent = fmtNumber(sessions.length);
  $("#overview-traces").textContent = fmtNumber(traces);
  $("#overview-error-rate").textContent = errorRate;
  $("#overview-tokens").textContent = fmtNumber(tokens);
}

function statusInfo(session) {
  if (session.status === "error") return {label: "ERR", className: "err"};
  if (session.status === "empty") return {label: "EMPTY", className: "empty-status"};
  if (session.live || session.status === "active") return {label: "LIVE", className: "live"};
  return {label: "OK", className: "ok"};
}

async function openSession(sessionId) {
  state.selectedSessionId = sessionId;
  state.view = "detail";
  renderSessions();
  showDetailView();
  await loadSession(sessionId);
}

function showListView() {
  state.view = "list";
  $("#list-view").classList.remove("hidden");
  $("#detail-view").classList.add("hidden");
  $("#trace-path-bar").innerHTML = '<span class="tp-label">Dashboard</span><span class="tp-val">trace history sessions</span>';
}

function showDetailView() {
  $("#list-view").classList.add("hidden");
  $("#detail-view").classList.remove("hidden");
}

async function loadSession(sessionId) {
  try {
    const payload = await fetchJSON(`/api/sessions/${encodeURIComponent(sessionId)}/records`);
    renderDetail(payload.session, payload.records || []);
  } catch (error) {
    showDetailView();
    $("#detail").innerHTML = `<div class="empty">Unable to load session: ${esc(error.message)}</div>`;
  }
}

function renderDetail(session, records) {
  const statusClass = ["active", "error", "empty"].includes(session.status) ? session.status : "";
  $("#detail-title").textContent = `${session.agent || "Session"} details`;
  $("#detail-subtitle").textContent = session.rel_trace_path || session.trace_path || "No trace path";
  $("#trace-path-bar").innerHTML = `
    <span class="tp-label">JSONL</span>
    <span class="tp-val">${esc(session.trace_path || session.rel_trace_path)}</span>
    <span class="tp-sep"></span>
    <span class="tp-label">HTML</span>
    <span class="tp-val">${esc(session.html_path || "not generated")}</span>
  `;
  if (session.html_path) {
    $("#detail").innerHTML = `
      <div class="viewer-frame-wrap">
        <iframe
          class="viewer-frame"
          title="Trace viewer"
          src="/api/sessions/${encodeURIComponent(session.id)}/html"
        ></iframe>
      </div>
    `;
    return;
  }
  $("#detail").innerHTML = `
    <div class="detail-fallback-note">HTML viewer is not generated yet. Showing captured records.</div>
    <div class="detail-inspector-bar">
      <div class="detail-tabs">
        <button class="detail-tab ${state.activeTab === "conversation" ? "active" : ""}" data-tab="conversation">Default</button>
        <button class="detail-tab ${state.activeTab === "raw" ? "active" : ""}" data-tab="raw">Trace</button>
      </div>
      <div class="action-bar">
        <button class="act-btn" data-copy-path="${esc(session.trace_path)}">Copy path</button>
      </div>
    </div>
    <div class="session-summary">
      <div class="session-summary-head">
        <span class="session-summary-title">${esc(session.agent)}</span>
        <span class="badge ${statusClass}">${esc(session.status)}</span>
        <span class="session-summary-path">${esc(session.rel_trace_path)}</span>
      </div>
      <div class="token-bar">
        ${tokenItem("var(--blue)", "Records", session.record_count)}
        ${tokenItem("var(--purple)", "Turns", session.turn_count)}
        ${tokenItem("var(--blue)", "Input", session.input_tokens)}
        ${tokenItem("var(--green)", "Output", session.output_tokens)}
        ${tokenItem("var(--cyan)", "Cache R", session.cache_read_tokens)}
        ${tokenItem("var(--amber)", "Cache W", session.cache_create_tokens)}
        ${tokenItem("var(--text-tertiary)", "Total", session.total_tokens)}
      </div>
    </div>
    <div id="conversation-tab" class="${state.activeTab === "conversation" ? "" : "hidden"}">
      <div class="records">${records.map((record, index) => renderRecord(record, index)).join("") || emptyRecord()}</div>
    </div>
    <div id="raw-tab" class="${state.activeTab === "raw" ? "" : "hidden"}">
      <div class="json-view open"><pre>${esc(JSON.stringify(records, null, 2))}</pre></div>
    </div>
  `;

  document.querySelectorAll("[data-tab]").forEach(button => {
    button.addEventListener("click", () => {
      state.activeTab = button.dataset.tab;
      renderDetail(session, records);
    });
  });
  document.querySelectorAll("[data-json-toggle]").forEach(button => {
    button.addEventListener("click", () => {
      const panel = document.getElementById(button.dataset.jsonToggle);
      panel?.classList.toggle("open");
    });
  });
  document.querySelectorAll("[data-copy-path]").forEach(button => {
    button.addEventListener("click", () => navigator.clipboard?.writeText(button.dataset.copyPath || ""));
  });
}

function tokenItem(color, label, value) {
  return `
    <span class="tok-item">
      <span class="tok-dot" style="background:${esc(color)}"></span>
      <span class="tok-label">${esc(label)}</span>
      <span class="tok-val">${fmtNumber(value)}</span>
    </span>
  `;
}

function renderRecord(record, index) {
  const request = record.request || {};
  const response = record.response || {};
  const userText = requestText(request.body) || "Request body has no user-facing message.";
  const responseText = responseTextFromRecord(record) || response.error || "Response body has no assistant text.";
  const status = response.status ?? "";
  const path = request.path || "";
  const jsonId = `json-${index}`;
  const statusClass = Number(status) >= 400 ? "error" : "";
  return `
    <article class="section">
      <div class="section-header">
        <span class="chevron">&#9654;</span>
        <span class="title">Turn ${esc(record.turn ?? index + 1)}</span>
        <span class="badge ${statusClass}">${esc(status || "ok")}</span>
        <span class="path">${esc(path)}</span>
        <button class="json-btn" data-json-toggle="${jsonId}">JSON</button>
      </div>
      <div class="section-body">
        <div class="conversation">
          <div class="msg user">
            <span class="msg-role">Request</span>
            <div class="content-block">${esc(userText)}</div>
          </div>
          <div class="msg assistant">
            <span class="msg-role">Response</span>
            <div class="content-block">${esc(responseText)}</div>
          </div>
        </div>
        <div id="${jsonId}" class="json-view"><pre>${esc(JSON.stringify(record, null, 2))}</pre></div>
      </div>
    </article>
  `;
}

function emptyRecord() {
  return '<div class="empty">This session has no captured API records yet.</div>';
}

function requestText(body) {
  if (typeof body === "string") return body;
  if (!body || typeof body !== "object") return "";
  if (Array.isArray(body.messages)) {
    const message = body.messages.find(item => item && item.role === "user");
    if (message) return contentText(message.content);
  }
  const input = contentText(body.input);
  if (input) return input;
  const request = body.request && typeof body.request === "object" ? body.request : body;
  if (Array.isArray(request.contents)) {
    const content = request.contents.find(item => item && (!item.role || item.role.toLowerCase() === "user"));
    if (content) return partsText(content.parts);
  }
  return typeof body.prompt === "string" ? body.prompt : "";
}

function responseTextFromBody(body) {
  if (typeof body === "string") return body;
  if (!body || typeof body !== "object") return "";
  const direct = contentText(body.content);
  if (direct) return direct;
  if (Array.isArray(body.candidates)) {
    return body.candidates.map(candidate => partsText(candidate?.content?.parts)).filter(Boolean).join("\\n");
  }
  if (Array.isArray(body.choices)) {
    return body.choices.map(choice => contentText(choice?.message?.content || choice?.delta?.content)).filter(Boolean).join("\\n");
  }
  const output = contentText(body.output);
  if (output) return output;
  return contentText(body.response);
}

function responseTextFromRecord(record) {
  const response = record.response || {};
  const bodyText = responseTextFromBody(response.body);
  if (bodyText) return bodyText;
  const events = Array.isArray(response.ws_events) ? response.ws_events : Array.isArray(response.sse_events) ? response.sse_events : [];
  for (let i = events.length - 1; i >= 0; i -= 1) {
    const event = events[i] || {};
    const payload = event.response && typeof event.response === "object" ? event.response : event.data || event;
    const text = responseTextFromBody(payload) || contentText(event.item) || contentText(event.part) || event.text || "";
    if (text) return text;
  }
  return "";
}

function contentText(value) {
  if (typeof value === "string") return value;
  if (Array.isArray(value)) {
    return value.map(item => {
      if (typeof item === "string") return item;
      if (!item || typeof item !== "object") return "";
      return contentText(item.text || item.content || item.output_text || "");
    }).filter(Boolean).join("\\n");
  }
  if (value && typeof value === "object") {
    return contentText(value.text || value.content || value.output_text || "");
  }
  return "";
}

function partsText(parts) {
  if (!Array.isArray(parts)) return "";
  return parts.map(part => typeof part?.text === "string" ? part.text : "").filter(Boolean).join("\\n");
}

function connectEvents() {
  if (!window.EventSource) {
    $("#live-label").textContent = "Polling";
    return;
  }
  const events = new EventSource("/dashboard/events");
  events.addEventListener("open", () => {
    $("#live-label").textContent = "Watching";
  });
  events.addEventListener("refresh", () => {
    refreshSessions({preserveSelection: true}).catch(console.error);
  });
  events.addEventListener("record", () => {
    refreshSessions({preserveSelection: true}).catch(console.error);
  });
  events.addEventListener("error", () => {
    $("#live-label").textContent = "Reconnecting";
  });
}

function initTheme() {
  const saved = localStorage.getItem("claude-tap-theme");
  const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
  applyTheme(saved || (prefersDark ? "dark" : "light"));
}

function toggleTheme() {
  const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
  localStorage.setItem("claude-tap-theme", next);
  applyTheme(next);
}

function applyTheme(theme) {
  if (theme === "dark") {
    document.documentElement.dataset.theme = "dark";
    $("#theme-toggle").textContent = "\u2600";
  } else {
    delete document.documentElement.dataset.theme;
    $("#theme-toggle").textContent = "\u263E";
  }
}

$("#search").addEventListener("input", event => {
  state.search = event.target.value;
  state.selectedSessionId = null;
  state.view = "list";
  renderSessions();
  showListView();
});

$("#date-filter").addEventListener("change", event => {
  state.date = event.target.value;
  state.selectedSessionId = null;
  state.view = "list";
  renderSessions();
  showListView();
});

$("#status-filter").addEventListener("change", event => {
  state.status = event.target.value;
  state.selectedSessionId = null;
  state.view = "list";
  renderSessions();
  showListView();
});

$("#refresh").addEventListener("click", () => refreshSessions({preserveSelection: true}).catch(console.error));
$("#back-to-list").addEventListener("click", () => {
  state.selectedSessionId = null;
  renderSessions();
  showListView();
});
$("#theme-toggle").addEventListener("click", toggleTheme);

initTheme();
updateClock();
setInterval(updateClock, 1000);
connectEvents();
refreshSessions({preserveSelection: false}).catch(error => {
  $("#detail").innerHTML = `<div class="empty">Unable to load dashboard: ${esc(error.message)}</div>`;
});
setInterval(() => refreshSessions({preserveSelection: true}).catch(console.error), 5000);
</script>
</body>
</html>
