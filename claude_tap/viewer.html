<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Self-contained claude-tap trace viewer for inspecting requests, prompts, tools, and token usage.">
<meta name="application-name" content="claude-tap">
<meta name="theme-color" content="#3b82f6">
<meta name="color-scheme" content="light dark">
<meta property="og:title" content="claude-tap Viewer">
<meta property="og:description" content="Inspect Claude API traces, system prompts, tools, and token usage with claude-tap.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%27http://www.w3.org/2000/svg%27 viewBox=%270 0 64 64%27%3E%3Cdefs%3E%3ClinearGradient id=%27g%27 x1=%270%27 y1=%270%27 x2=%271%27 y2=%271%27%3E%3Cstop offset=%270%25%27 stop-color=%27%233b82f6%27/%3E%3Cstop offset=%27100%25%27 stop-color=%27%2310b981%27/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect x=%274%27 y=%274%27 width=%2756%27 height=%2756%27 rx=%2716%27 fill=%27url(%23g)%27/%3E%3Cpath d=%27M32 16v16l10 6%27 stroke=%27white%27 stroke-width=%275%27 stroke-linecap=%27round%27 stroke-linejoin=%27round%27 fill=%27none%27/%3E%3C/svg%3E">
<title>claude-tap Viewer</title>
<!-- CLAUDE_TAP_VIEWER_STYLE -->
</head>
<body>

<div class="header">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
    <span id="logo-text">claude-tap</span>
    <span class="logo-version" id="logo-version"></span>
  </div>
  <div class="divider"></div>
  <div class="path-filter" id="path-filter" style="display:none"></div>
  <div class="stats" id="stats" style="display:none">
    <div class="stat-group"><span id="label-turns">Turns</span> <span class="stat-val" id="stat-turns">0</span></div>
    <div class="stat-group"><span id="label-tokens">Tokens</span> <span class="stat-val" id="stat-tokens">0</span></div>
    <div class="stat-group" id="stat-input-group" style="display:none"><span style="color:var(--blue)">&#9679;</span><span>In</span> <span class="stat-val" id="stat-input">0</span></div>
    <div class="stat-group" id="stat-output-group" style="display:none"><span style="color:var(--green)">&#9679;</span><span>Out</span> <span class="stat-val" id="stat-output">0</span></div>
    <div class="stat-group" id="stat-cache-read-group" style="display:none"><span style="color:var(--cyan)">&#9679;</span><span>Cache R</span> <span class="stat-val" id="stat-cache-read">0</span></div>
    <div class="stat-group" id="stat-cache-write-group" style="display:none"><span style="color:var(--amber)">&#9679;</span><span>Cache W</span> <span class="stat-val" id="stat-cache-write">0</span></div>
    <div class="stat-group" id="stat-cache-hit-rate-group" style="display:none"><span style="color:var(--purple)">&#9679;</span><span>Cache Hit</span> <span class="stat-val" id="stat-cache-hit-rate">0%</span></div>
    <div class="stat-group"><span id="label-time">Time</span> <span class="stat-val" id="stat-duration">0s</span></div>
    <div id="live-status" style="display:none;padding:4px 10px;border-radius:12px;font-size:12px;font-weight:500;align-items:center;gap:6px;"></div>
  </div>
  <div class="viewer-actions" id="viewer-actions" style="display:none"></div>
  <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">&#9790;</button>
  <select class="lang-select" id="lang-select" onchange="setLang(this.value)">
    <option value="en">English</option>
    <option value="zh-CN">简体中文</option>
    <option value="ja">日本語</option>
    <option value="ko">한국어</option>
    <option value="fr">Français</option>
    <option value="ar">العربية</option>
    <option value="de">Deutsch</option>
    <option value="ru">Русский</option>
  </select>
</div>

<div class="trace-path-bar" id="trace-path-bar"></div>
<div class="global-search-overlay" id="global-search-overlay">
  <div class="global-search-box">
    <input type="text" id="global-search-input" placeholder="Find in trace">
    <span class="global-search-count" id="global-search-count">0 of 0</span>
    <button class="global-search-btn" id="global-search-prev" type="button" title="Previous match (Shift+Enter)">Prev</button>
    <button class="global-search-btn" id="global-search-next" type="button" title="Next match (Enter)">Next</button>
    <button class="global-search-btn" id="global-search-close" type="button" title="Close (Escape)">Close</button>
  </div>
</div>

<div class="main" id="main-area">
  <div class="drop-zone" id="drop-zone">
    <div class="drop-zone-inner" id="drop-inner">
      <h2 id="drop-title">Load Trace File</h2>
      <p id="drop-desc">Drag &amp; drop a .jsonl trace file, or click to browse</p>
      <label for="file-input" id="drop-btn-label">Choose File</label>
      <input type="file" id="file-input" accept=".jsonl,.json,.ctap">
    </div>
  </div>
  <div id="sidebar-wrap" style="display:none;display:flex;flex-direction:column">
    <div id="date-picker" class="history-bar">
      <label class="history-label" id="date-label">Date:</label>
      <select class="history-select" id="date-select" onchange="onDateChange(this.value)"></select>
      <button class="history-delete-btn" id="history-delete-btn" type="button" onclick="deleteSelectedTraceDate()" disabled>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v5M14 11v5"/></svg>
        <span id="history-delete-text">Delete</span>
      </button>
    </div>
    <div class="history-delete-status" id="history-delete-status" role="status" aria-live="polite"></div>
    <div class="search-bar" id="search-bar">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="search-input" placeholder="Search messages, tools, prompts..." oninput="onSearch(this.value)">
      <button class="search-clear" id="search-clear" onclick="clearSearch()">&#10005;</button>
    </div>
    <div class="sidebar-sort" id="sidebar-sort" role="group" aria-label="Sidebar order">
      <span class="sidebar-sort-label" id="sidebar-sort-label">Order</span>
      <div class="sidebar-sort-segment">
        <button type="button" class="sidebar-sort-btn" data-sort-mode="model" onclick="setSidebarOrderMode('model')">Model</button>
        <button type="button" class="sidebar-sort-btn" data-sort-mode="turn" onclick="setSidebarOrderMode('turn')">Turn</button>
        <button type="button" class="sidebar-sort-btn" data-sort-mode="session" onclick="setSidebarOrderMode('session')">Query</button>
      </div>
    </div>
    <div id="tool-filter" style="display:none;padding:4px 8px;border-bottom:1px solid var(--border);font-size:11px;max-height:120px;overflow-y:auto"></div>
    <div class="position-indicator" id="position-indicator">
      <span>Turn <span class="pi-current" id="pi-current">0</span> <span class="pi-total" id="pi-total">of 0</span></span>
      <div class="pi-bar"><div class="pi-fill" id="pi-fill"></div></div>
    </div>
    <div class="sidebar" id="sidebar" style="flex:1;overflow-y:auto"></div>
  </div>
  <button id="mobile-back-btn" onclick="mobileShowSidebar()" style="display:none">&#8592; Back to list</button>
  <div id="mobile-nav-bar" style="display:none">
    <button id="mobile-prev-btn" onclick="mobilePrev()" aria-label="Previous entry">&#8592;</button>
    <span id="mobile-nav-pos"></span>
    <button id="mobile-next-btn" onclick="mobileNext()" aria-label="Next entry">&#8594;</button>
  </div>
  <div class="detail" id="detail" style="display:none"></div>
</div>

<!-- CLAUDE_TAP_VIEWER_SCRIPT -->
</body>
</html>
